* { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
.app { font-family:'Baloo 2','Trebuchet MS',system-ui,sans-serif; color:#2D2A32; max-width:520px; margin:0 auto; min-height:100vh; position:relative; background:radial-gradient(120% 90% at 50% -10%, #FFE9C9 0%, #FFD9E0 45%, #D9F2FF 100%); overflow-x:hidden; }
.pc-hz,.rp-hz,.wp-hz,.reveal { font-family:'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif; }
.screen { padding:16px; padding-bottom:40px; animation:fade .3s ease; }
@keyframes fade { from{opacity:0; transform:translateY(8px);} to{opacity:1;} }
.home { text-align:center; padding-top:20px; }
.floaty { display:inline-block; animation:float 3s ease-in-out infinite; } @keyframes float { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-12px);} }
.home-title { font-size:29px; font-weight:800; margin:6px 0 2px; color:#E8455E; text-shadow:0 2px 0 #fff; }
.home-sub { color:#6b6470; font-weight:600; margin:0 12px 14px; }
.setup-card { background:#fff; border-radius:20px; padding:12px 16px; margin:0 4px 14px; box-shadow:0 4px 0 #ecdfce; }
.setup-row { display:flex; align-items:center; justify-content:space-between; padding:6px 0; font-weight:700; color:#5b5563; }
.seg { display:flex; gap:6px; } .segb { font-family:inherit; border:none; background:#F2ECE2; border-radius:12px; padding:7px 12px; font-weight:800; font-size:13px; cursor:pointer; color:#8a8492; } .segb.on { background:#FFC93C; color:#7a4d00; }
.modebtn { width:100%; font-family:inherit; border:none; border-radius:20px; padding:16px; margin:9px 0; cursor:pointer; display:flex; align-items:center; gap:14px; text-align:left; color:#fff; box-shadow:0 6px 0 rgba(0,0,0,.16); }
.modebtn:active { transform:translateY(4px); box-shadow:0 2px 0 rgba(0,0,0,.16); }
.modebtn div { flex:1; display:flex; flex-direction:column; } .modebtn b { font-size:19px; } .modebtn span { font-size:13px; opacity:.92; font-weight:600; }
.modebtn.listen { background:linear-gradient(180deg,#56CCF2,#3AA6E0); } .modebtn.read { background:linear-gradient(180deg,#2EC4B6,#1FA597); } .modebtn.write { background:linear-gradient(180deg,#FF8FA3,#FF5A6E); } .modebtn.browse { background:linear-gradient(180deg,#9B5DE5,#7d3fc9); }
.map-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; } .map-head h2 { margin:0; font-size:20px; color:#E8455E; }
.back { width:40px; height:40px; border:none; border-radius:14px; background:#fff; cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:0 3px 0 #e2d8ca; color:#544f5b; } .back:active { transform:translateY(2px); }
.q-score { font-weight:800; color:#a37200; background:#FFF3D6; padding:5px 12px; border-radius:14px; }
.q-prompt { text-align:center; font-weight:700; font-size:17px; color:#5b5563; margin:6px 0 12px; }
.chips { display:flex; gap:8px; margin-bottom:12px; }
.chip { font-family:inherit; border:none; background:#fff; border-radius:14px; padding:8px 14px; font-weight:700; font-size:14px; cursor:pointer; box-shadow:0 3px 0 #e7ddcf; color:#544f5b; } .chip.on { background:#FFC93C; color:#7a4d00; box-shadow:0 3px 0 #d9a400; }
.phrase-list { display:flex; flex-direction:column; gap:10px; }
.phrase-card { font-family:inherit; border:none; background:#fff; border-radius:16px; padding:12px 16px; cursor:pointer; box-shadow:0 4px 0 #ecdfce; text-align:left; }
.phrase-card:active { transform:translateY(2px); box-shadow:0 2px 0 #ecdfce; }
.pc-top { display:flex; align-items:center; justify-content:space-between; } .pc-py { font-size:19px; font-weight:800; color:#3a3640; } .pc-spk { color:#bcd; }
.pc-hz { font-size:20px; font-weight:700; margin:2px 0; } .pc-en { font-size:14px; color:#8a8492; font-weight:600; }
.ear-btn { font-family:inherit; border:none; background:#56CCF2; color:#fff; border-radius:22px; padding:18px 30px; font-size:20px; font-weight:800; cursor:pointer; box-shadow:0 6px 0 #2f9fc4; display:flex; align-items:center; gap:10px; margin:0 auto 16px; } .ear-btn:active { transform:translateY(3px); box-shadow:0 3px 0 #2f9fc4; }
.read-prompt { display:flex; flex-direction:column; gap:4px; align-items:center; background:#fff; border:none; border-radius:22px; padding:18px 24px; margin:0 auto 16px; cursor:pointer; box-shadow:0 8px 0 #ecdfce; }
.rp-py { font-size:26px; font-weight:800; color:#3a3640; text-align:center; } .rp-hz { font-size:17px; color:#8a8492; font-weight:700; display:flex; align-items:center; gap:5px; }
.choices { display:flex; flex-direction:column; gap:12px; width:100%; }
.choice { font-family:inherit; border:none; background:#fff; border-radius:18px; padding:15px 18px; cursor:pointer; box-shadow:0 5px 0 #e7ddcf; display:flex; align-items:center; gap:8px; }
.choice:active { transform:translateY(3px); box-shadow:0 2px 0 #e7ddcf; }
.choice-py { font-size:18px; font-weight:800; color:#3a3640; } .choice-en2 { font-size:17px; font-weight:700; color:#3a3640; } .choice .choice-ic { margin-left:auto; }
.choice.ok { background:#D9F7E8; box-shadow:0 5px 0 #9fe0c4; } .choice.ok .choice-ic { color:#10a06f; } .choice.bad { background:#FFE0E3; box-shadow:0 5px 0 #f3b6bc; } .choice.bad .choice-ic { color:#E8455E; }
.reveal { text-align:center; font-weight:700; color:#5b5563; margin-top:12px; background:#fff; border-radius:14px; padding:10px; box-shadow:0 3px 0 #ecdfce; }
.bad-reveal { color:#c0392b; } .bad-reveal b { color:#E8455E; }
.write-prompt { background:#fff; border-radius:18px; padding:14px 18px; box-shadow:0 5px 0 #ecdfce; text-align:center; cursor:pointer; margin-bottom:12px; }
.wp-en { font-size:19px; font-weight:800; color:#3a3640; } .wp-hz { font-size:16px; color:#8a8492; font-weight:700; display:inline-flex; align-items:center; gap:5px; margin-top:2px; }
.answer-line { min-height:56px; background:#fff; border-radius:16px; padding:10px; box-shadow:inset 0 2px 6px rgba(0,0,0,.06); display:flex; flex-wrap:wrap; gap:8px; align-items:center; margin-bottom:14px; border:2px solid transparent; }
.answer-line.ok { border-color:#2EC4B6; background:#EAF9F2; } .answer-line.bad { border-color:#FF8FA3; background:#FFF0F2; }
.ans-hint { color:#b3aca3; font-weight:600; font-size:14px; padding:6px; }
.bank { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin-bottom:16px; min-height:44px; }
.tile { font-family:inherit; border:none; background:#fff; border-radius:14px; padding:10px 14px; font-size:18px; font-weight:800; cursor:pointer; box-shadow:0 4px 0 #d9cfc0; color:#3a3640; }
.tile:active { transform:translateY(2px); box-shadow:0 2px 0 #d9cfc0; } .tile.placed { background:#EAF4FF; box-shadow:0 4px 0 #bcdcf5; }
.bigbtn { font-family:inherit; font-size:18px; font-weight:800; color:#fff; background:linear-gradient(180deg,#FF7A8A,#FF5A6E); border:none; border-radius:22px; padding:14px 20px; cursor:pointer; box-shadow:0 6px 0 #d83b54; display:inline-flex; align-items:center; justify-content:center; gap:8px; width:100%; }
.bigbtn:active { transform:translateY(4px); box-shadow:0 2px 0 #d83b54; } .bigbtn:disabled { background:#cfc8c0; box-shadow:0 6px 0 #b3aca3; } .bigbtn.ghost { background:#fff; color:#544f5b; box-shadow:0 5px 0 #e2d8ca; margin-top:10px; } .bigbtn.ghost:active { box-shadow:0 2px 0 #e2d8ca; }
.result-screen { text-align:center; display:flex; flex-direction:column; align-items:center; gap:10px; padding-top:26px; }
.result-title { font-size:28px; color:#E8455E; margin:6px 0 0; } .result-stars { display:flex; gap:6px; } .star-off { color:#E4DACB; }
.big-score { font-size:40px; font-weight:800; color:#2EC4B6; } .big-score span { font-size:20px; color:#8a8492; } .result-label { font-weight:800; color:#a37200; margin-bottom:6px; }
.result-screen .bigbtn { max-width:280px; }
.mascot { position:relative; display:flex; align-items:center; justify-content:center; } .mascot-spark { position:absolute; top:-4px; right:-4px; font-size:24px; }
.confetti-wrap { position:fixed; inset:0; pointer-events:none; overflow:hidden; z-index:55; } .confetti-piece { position:absolute; top:-12px; width:11px; height:14px; border-radius:2px; animation:confetti-fall linear forwards; }
@keyframes confetti-fall { to { transform:translateY(110vh) rotate(540deg); opacity:.9; } }
@media (prefers-reduced-motion: reduce) { * { animation-duration:.001s !important; animation-iteration-count:1 !important; } }
