/* ---------------- Text-to-speech (listening) ---------------- */
let zhVoice=null;
function pickVoice(){
  const vs=window.speechSynthesis?window.speechSynthesis.getVoices():[];
  zhVoice=vs.find(v=>/zh(-|_)?CN/i.test(v.lang))||vs.find(v=>/zh/i.test(v.lang))||null;
}
if(window.speechSynthesis){ pickVoice(); window.speechSynthesis.onvoiceschanged=pickVoice; }
function speak(text){
  if(!window.speechSynthesis){ return; }
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang="zh-CN"; u.rate=0.8; u.pitch=1;
  if(zhVoice) u.voice=zhVoice;
  window.speechSynthesis.speak(u);
}
function ttsAvailable(){ return !!window.speechSynthesis; }

   q:"李老师是哪国人？", qpy:"Lǐ lǎoshī shì nǎ guó rén?", opts:[{zh:"中国人",py:"Zhōngguó rén"},{zh:"美国人",py:"Měiguó rén"},{zh:"短文没有说",py:"duǎnwén méiyǒu shuō"}], ans:0, src:"L1–2 · 短文"},
  {type:'read', lines:[["我有一个哥哥，没有弟弟。","Wǒ yǒu yí ge gēge, méiyǒu dìdi."],["哥哥今年十五岁，我今年十岁。","Gēge jīnnián shíwǔ suì, wǒ jīnnián shí suì."]],
   q:"关于弟弟，下面哪个对？", qpy:"Guānyú dìdi, nǎge duì?", opts:[{zh:"他没有弟弟。",py:"Tā méiyǒu dìdi."},{zh:"他有一个弟弟。",py:"Tā yǒu yí ge dìdi."},{zh:"他有两个弟弟。",py:"Tā yǒu liǎng ge dìdi."}], ans:0, src:"L4 · 有/没有（细节）"},
  {type:'resp', zh:"你爸爸是不是老师？", py:"Nǐ bàba shì bu shì lǎoshī?", opts:[{zh:"不是，他不是老师。",py:"Bú shì, tā bú shì lǎoshī."},{zh:"今天八号。",py:"Jīntiān bā hào."},{zh:"我喜欢喝水。",py:"Wǒ xǐhuan hē shuǐ."}], ans:0, src:"L2 · 正反问"},
];

/* ---------------- storage ---------------- */
function skey(){const el=document.getElementById('studentName');const n=el?el.value.trim():'';return "aruna_lr_"+(n?n.toLowerCase().replace(/\s+/g,'_'):'guest');}
function loadP(){try{return Object.assign({listenBest:0,readBest:0},JSON.parse(localStorage.getItem(skey()))||{});}catch(e){return {listenBest:0,readBest:0};}}
function saveP(p){try{localStorage.setItem(skey(),JSON.stringify(p));}catch(e){}}
function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

/* ---------------- tabs ---------------- */
const TABS=[{id:'listen',label:'🎧 听力 Listening'},{id:'read',label:'📖 阅读 Reading'}];
function initTabs(){document.getElementById('tabNav').innerHTML=TABS.map((t,i)=>`<button data-tab="${t.id}" class="${i===0?'active':''}" onclick="switchTab('${t.id}')">${t.label}</button>`).join('');}
function switchTab(id){
  if(window.speechSynthesis) window.speechSynthesis.cancel();
  document.querySelectorAll('nav.tabs button').forEach(b=>b.classList.toggle('active',b.dataset.tab===id));
  document.querySelectorAll('.panel').forEach(p=>p.classList.toggle('active',p.id==='panel-'+id));
  if(id==='listen') renderListenIntro();
  if(id==='read') renderReadIntro();
}
function updateBadge(){const p=loadP();document.getElementById('scoreBadge').textContent=`🎧 ${p.listenBest||0} · 📖 ${p.readBest||0}`;}

/* ---------------- LISTENING ---------------- */
let LS=null;
function renderListenIntro(){
  const p=loadP();
  document.getElementById('panel-listen').innerHTML=`
    <div class="card">
      <h2>听力 · Listening — Lessons 1–5</h2>
      <div class="warn ${ttsAvailable()?'':'show'}">Your browser has no Chinese voice available, so audio may not play. Try Chrome or Edge, or use the Reading tab.</div>
      <p class="note">Press ▶ 播放 to hear the Chinese, then choose the answer. You can replay as many times as you like. ${LISTEN.length} questions.</p>
      <div class="result-box">
        <div style="font-size:.85rem;color:var(--gray);">Your best</div>
        <div class="gauge">${p.listenBest||0} / ${LISTEN.length}</div>
        <button class="btn big" onclick="startListen()">Start Listening test</button>
      </div>
    </div>`;
}
function startListen(){LS={i:0,correct:0};drawListen();}
function drawListen(){
  if(LS.i>=LISTEN.length) return finishListen();
  const q=LISTEN[LS.i]; const el=document.getElementById('panel-listen');
  let optsHtml='';
  if(q.type==='pic'){
    optsHtml=`<div class="opt-grid">${q.opts.map((e,j)=>`<button class="opt-emoji" onclick="ansListen(${j},this)">${e}</button>`).join('')}</div>`;
  }else{
    optsHtml=q.opts.map((o,j)=>`<button class="mc-opt" onclick="ansListen(${j},this)">${o.zh}<span class="py">${o.py}</span></button>`).join('');
  }
  el.innerHTML=`
    <div class="card">
      <div class="qcount">Question ${LS.i+1} of ${LISTEN.length} · Score ${LS.correct}</div>
      <div class="progress-wrap"><div class="progress-bar" style="width:${LS.i/LISTEN.length*100}%"></div></div>
      <div class="play-stage">
        <button class="play-btn" onclick="speak('${q.zh}')">▶ 播放 Play audio</button>
        <div class="play-hint">${q.type==='pic'?'Choose the picture that matches what you hear':'Choose the best reply to what you hear'}</div>
        <div class="reveal-zh" id="revealZh"></div>
        <div class="src-tag">${q.src}</div>
      </div>
      ${optsHtml}
      <div class="feedback" id="lfb"></div>
      <div id="lnext" style="text-align:center;"></div>
    </div>`;
  setTimeout(()=>speak(q.zh),250);
}
function ansListen(j,btn){
  const q=LISTEN[LS.i]; const ok=j===q.ans;
  document.querySelectorAll('#panel-listen .opt-emoji,#panel-listen .mc-opt').forEach((b,idx)=>{
    b.disabled=true; if(idx===q.ans)b.classList.add('correct');
  });
  if(!ok) btn.classList.add('wrong');
  if(ok) LS.correct++;
  document.getElementById('revealZh').innerHTML=`${q.zh}<span class="py">${q.py}</span>`;
  const fb=document.getElementById('lfb'); fb.className='feedback '+(ok?'ok':'no');
  fb.innerHTML=ok?`✓ 对了！`:`✗ You heard: <strong>${q.zh}</strong> · ${q.py}`;
  document.getElementById('lnext').innerHTML=`<button class="btn big" id="lnextBtn" onclick="LS.i++;drawListen();">Next →</button>`;
  document.getElementById('lnextBtn').focus();
}
function finishListen(){
  const p=loadP(); p.listenBest=Math.max(p.listenBest||0,LS.correct); saveP(p); updateBadge();
  document.getElementById('panel-listen').innerHTML=`
    <div class="card"><h2>听力 · Complete</h2><div class="result-box">
      <div class="gauge">${LS.correct} / ${LISTEN.length}</div>
      <button class="btn big" onclick="startListen()">↺ Again</button>
      <button class="btn gold big" onclick="switchTab('read')">Go to Reading →</button>
    </div></div>`;
}

/* ---------------- READING ---------------- */
let RS=null;
function renderReadIntro(){
  const p=loadP();
  document.getElementById('panel-read').innerHTML=`
    <div class="card">
      <h2>阅读 · Reading — Lessons 1–5</h2>
      <p class="note">Read the Chinese (pinyin is shown) and choose the answer. ${READ.length} questions covering greetings, names, age, family, and time.</p>
      <div class="result-box">
        <div style="font-size:.85rem;color:var(--gray);">Your best</div>
        <div class="gauge">${p.readBest||0} / ${READ.length}</div>
        <button class="btn big" onclick="startRead()">Start Reading test</button>
      </div>
    </div>`;
}
function startRead(){RS={i:0,correct:0};drawRead();}
function drawRead(){
  if(RS.i>=READ.length) return finishRead();
  const q=READ[RS.i]; const el=document.getElementById('panel-read');
  let stage='',opts='';
  if(q.type==='tf'){
    stage=`<div class="read-stage"><div class="read-emoji">${q.emoji}</div><div class="read-zh">${q.zh}</div><div class="read-py">${q.py}</div><div class="src-tag">${q.src}</div></div>`;
    opts=`<div class="tf-row"><button class="tf-btn" onclick="ansReadTF(true,this)">✓ 对</button><button class="tf-btn" onclick="ansReadTF(false,this)">✗ 错</button></div>`;
  }else if(q.type==='resp'){
    stage=`<div class="read-stage"><div class="read-zh">${q.zh}</div><div class="read-py">${q.py}</div><div class="src-tag">${q.src}</div></div>`;
    opts=q.opts.map((o,j)=>`<button class="mc-opt" onclick="ansRead(${j},this)">${o.zh}<span class="py">${o.py}</span></button>`).join('');
  }else{ // read passage
    stage=`<div class="read-stage" style="text-align:left;">${q.lines.map(l=>`<div class="read-zh" style="font-size:1.3rem;">${l[0]}<div class="read-py">${l[1]}</div></div>`).join('')}<div class="src-tag">${q.src}</div></div>
      <div style="font-weight:700;color:var(--red-dark);margin:6px 0;">${q.q} <span style="color:var(--gray);font-weight:400;font-style:italic;font-size:.85rem;">${q.qpy}</span></div>`;
    opts=q.opts.map((o,j)=>`<button class="mc-opt" onclick="ansRead(${j},this)">${o.zh}<span class="py">${o.py}</span></button>`).join('');
  }
  el.innerHTML=`
    <div class="card">
      <div class="qcount">Question ${RS.i+1} of ${READ.length} · Score ${RS.correct}</div>
      <div class="progress-wrap"><div class="progress-bar" style="width:${RS.i/READ.length*100}%"></div></div>
      ${stage}${opts}
      <div class="feedback" id="rfb"></div>
      <div id="rnext" style="text-align:center;"></div>
    </div>`;
}
function ansReadTF(choice,btn){
  const q=READ[RS.i]; const ok=choice===q.ans;
  document.querySelectorAll('#panel-read .tf-btn').forEach(b=>b.disabled=true);
  btn.classList.add(ok?'correct':'wrong');
  if(ok)RS.correct++;
  const fb=document.getElementById('rfb'); fb.className='feedback '+(ok?'ok':'no');
  fb.innerHTML=ok?`✓ 对了！<strong>${q.zh}</strong> ${q.py}`:`✗ ${q.zh} ${q.py} — ${q.ans?'matches ✓':'does NOT match ✗'} the picture.`;
  nextRead();
}
function ansRead(j,btn){
  const q=READ[RS.i]; const ok=j===q.ans;
  document.querySelectorAll('#panel-read .mc-opt').forEach((b,idx)=>{b.disabled=true;if(idx===q.ans)b.classList.add('correct');});
  if(!ok)btn.classList.add('wrong');
  if(ok)RS.correct++;
  const fb=document.getElementById('rfb'); fb.className='feedback '+(ok?'ok':'no');
  fb.innerHTML=ok?`✓ 对了！`:`✗ Correct answer: <strong>${q.opts[q.ans].zh}</strong> ${q.opts[q.ans].py}`;
  nextRead();
}
function nextRead(){
  document.getElementById('rnext').innerHTML=`<button class="btn big" id="rnextBtn" onclick="RS.i++;drawRead();">Next →</button>`;
  document.getElementById('rnextBtn').focus();
}
function finishRead(){
  const p=loadP(); p.readBest=Math.max(p.readBest||0,RS.correct); saveP(p); updateBadge();
  document.getElementById('panel-read').innerHTML=`
    <div class="card"><h2>阅读 · Complete</h2><div class="result-box">
      <div class="gauge">${RS.correct} / ${READ.length}</div>
      <button class="btn big" onclick="startRead()">↺ Again</button>
      <button class="btn gold big" onclick="switchTab('listen')">Back to Listening →</button>
    </div></div>`;
}

/* ---------------- init ---------------- */
document.addEventListener('DOMContentLoaded',()=>{
  let saved=null;try{saved=localStorage.getItem('aruna_lr_name');}catch(e){}
  if(saved)document.getElementById('studentName').value=saved;
  document.getElementById('studentName').addEventListener('change',()=>{
    try{localStorage.setItem('aruna_lr_name',document.getElementById('studentName').value.trim());}catch(e){}
    updateBadge();renderListenIntro();renderReadIntro();
  });
  initTabs(); renderListenIntro(); updateBadge();
  console.log(COPYRIGHT);
});
</script>
</body>
</html>
