<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>第四课 · 价格谈判 — Price Negotiation</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500&family=Inter:wght@300;400;500;600&display=swap');

  :root {

  body {

  }

  /* Header */

    text-align: center;
    position: relative;

  }
  .header::before {
    content: '谈';
    position: absolute;
    font-family: 'Noto Serif SC', serif;
    font-size: 180px;
    font-weight: 700;
    color: rgba(255,255,255,0.04);
    top: -30px; right: -10px;
    pointer-events: none;
  }
  .lesson-tag {
    display: inline-block;
    background: var(--red);
    color: white;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 2px;
    margin-bottom: 10px;
  }
  .header h1 {
    font-family: 'Noto Serif SC', serif;
    font-size: clamp(20px, 5vw, 28px);
    font-weight: 700;
    letter-spacing: 0.05em;
    margin-bottom: 4px;
  }
  .header .subtitle {
    font-size: 13px;
    color: rgba(255,255,255,0.55);
    letter-spacing: 0.06em;
  }

  /* Section headers */
  .section-label {
    display: flex;
    align-items: center;

    padding: 18px 16px 10px;
    font-size: 11px;
    font-weight: 600;

    text-transform: uppercase;
    color: var(--muted);
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--line);
  }

  /* Line cards */
  .lines-container {
    padding: 0 12px 80px;
    max-width: 700px;
    margin: 0 auto;
  }

  .line-card {
    background: white;
    border: 1px solid var(--line);

    margin-bottom: 8px;
    overflow: hidden;
    transition: border-color 0.2s, box-shadow 0.2s;
    cursor: pointer;
  }
  .line-card:hover { border-color: var(--gold); }
  .line-card.active {
    border-color: var(--active-border);
    box-shadow: 0 2px 12px rgba(212,160,23,0.15);
  }

  .line-header {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 14px 14px 12px;
  }

  .time-badge {
    background: var(--paper);

    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.06em;

    margin-top: 2px;

  .chinese-text {

    font-size: 17px;

    line-height: 1.6;
    color: var(--ink);

  .play-btn {
    background: none;

    cursor: pointer;
    color: var(--muted);
    padding: 2px;
    flex-shrink: 0;
    transition: color 0.2s;
    display: flex;
    align-items: center;

    padding: 12px 14px 8px;

    letter-spacing: 0.04em;
    font-style: italic;

    border-bottom: 1px dashed var(--line);

  .pinyin-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;

    font-style: normal;
    margin-bottom: 4px;
    display: block;

  .meaning-row {
    padding: 10px 14px 14px;
  }
  .meaning-label {
    font-size: 10px;

    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 5px;

  }
  .meaning-text {
    font-size: 14px;

  .ctrl-btn {

  .progress-text {

  }
  .progress-bar-wrap {
    flex: 1;
    height: 3px;

  }
  .progress-bar-fill {
    height: 100%;
    background: var(--gold);
    transition: width 0.3s;

</style>

let currentIndex = 0;
let currentUtterance = null;

function buildCards() {
  const container = document.getElementById('linesContainer');

  // Section groups
  const sections = [
    { label: "Introduction", range: [0, 1] },
    { label: "Part 1 · Who to Negotiate With", range: [2, 6] },
    { label: "Part 2 · Where to Sit", range: [7, 11] },
    { label: "Part 3 · How to Begin", range: [12, 15] },
    { label: "Closing", range: [16, 16] },
  ];

  let sectionIdx = 0;
  lines.forEach((line, i) => {
    // Check if new section
    const sec = sections.find(s => s.range[0] === i);
    if (sec) {
      const label = document.createElement('div');
      label.className = 'section-label';
      label.textContent = sec.label;
      container.appendChild(label);
    }

    const card = document.createElement('div');
    card.className = 'line-card' + (i === 0 ? ' active' : '');
    card.id = `card-${i}`;
    card.onclick = () => toggleCard(i);

    const vocabHtml = line.vocab.map(v =>
      `<div class="vocab-chip"><span class="zh">${v.zh}</span><span class="py">${v.py}</span><span class="en">· ${v.en}</span></div>`
    ).join('');

    card.innerHTML = `
      <div class="line-header">
        <span class="time-badge">${line.time}</span>
        <span class="chinese-text">${line.zh}</span>
        <button class="play-btn" id="playBtn-${i}" onclick="event.stopPropagation(); speakLine(${i})" title="Listen">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <path d="M8 5v14l11-7z"/>
          </svg>
        </button>
      </div>
      <div class="line-details">
        <div class="pinyin-row">
          <span class="pinyin-label">Pīnyīn</span>
          ${line.pinyin}
        </div>
        <div class="meaning-row">
          <span class="meaning-label">English Meaning</span>
          <div class="meaning-text">${line.en}</div>
        </div>
        ${line.vocab.length ? `<div class="vocab-row">${vocabHtml}</div>` : ''}
      </div>
    `;

    container.appendChild(card);
  });

  updateProgress();
}

function toggleCard(i) {
  const prev = document.querySelector('.line-card.active');
  if (prev) prev.classList.remove('active');
  const card = document.getElementById(`card-${i}`);
  if (card) {
    card.classList.add('active');
    card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
  currentIndex = i;
  updateProgress();
}

function nextLine() {
  if (currentIndex < lines.length - 1) {
    toggleCard(currentIndex + 1);
  }
}

function prevLine() {
  if (currentIndex > 0) {
    toggleCard(currentIndex - 1);
  }
}

function updateProgress() {
  const fill = document.getElementById('progressFill');
  const text = document.getElementById('progressText');
  const pct = ((currentIndex + 1) / lines.length) * 100;
  fill.style.width = pct + '%';
  text.textContent = `${currentIndex + 1} / ${lines.length}`;
}

function speakLine(i) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const btn = document.getElementById(`playBtn-${i}`);

  const utter = new SpeechSynthesisUtterance(lines[i].zh);
  utter.lang = 'zh-CN';
  utter.rate = 0.85;

  // Try to find a Mandarin voice
  const voices = window.speechSynthesis.getVoices();
  const zhVoice = voices.find(v => v.lang.startsWith('zh'));
  if (zhVoice) utter.voice = zhVoice;

  btn.classList.add('playing');
  utter.onend = () => btn.classList.remove('playing');
  utter.onerror = () => btn.classList.remove('playing');

  window.speechSynthesis.speak(utter);
}

// Init voices (some browsers need a trigger)
window.speechSynthesis && window.speechSynthesis.getVoices();

buildCards();
</script>
</body>
</html>
