@import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Noto+Sans+SC:wght@500;700;900&display=swap');
* { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
.app { font-family:'Baloo 2','Trebuchet MS',system-ui,sans-serif; color:#2D2A32; max-width:520px; margin:0 auto; min-height:100vh; position:relative; background:radial-gradient(120% 90% at 50% -10%, #FFE9C9 0%, #FFD9E0 45%, #D9F2FF 100%); overflow-x:hidden; }
.rad-char,.trace-guide,.q-rad-char,.rad-var,.tm-meaning b,.q-rad-var,.tm-var { font-family:'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif; }
.screen { padding:16px; padding-bottom:40px; animation:fade .3s ease; }
@keyframes fade { from{opacity:0; transform:translateY(8px);} to{opacity:1;} }
.home { text-align:center; padding-top:22px; }
.floaty { display:inline-block; animation:float 3s ease-in-out infinite; } @keyframes float { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-12px);} }
.home-title { font-size:30px; font-weight:800; margin:6px 0 2px; color:#E8455E; text-shadow:0 2px 0 #fff; }
.home-sub { color:#6b6470; font-weight:600; margin:0 12px 14px; }
.progress-card { background:#fff; border-radius:20px; padding:12px 16px; margin:12px 4px; box-shadow:0 4px 0 #ecdfce; }
.progress-top { display:flex; justify-content:space-between; font-weight:700; font-size:14px; margin-bottom:8px; }
.pbar { height:14px; background:#F0E7DA; border-radius:10px; overflow:hidden; } .pbar span { display:block; height:100%; background:linear-gradient(90deg,#2EC4B6,#56CCF2); transition:width .4s; }
.modebtn { width:100%; font-family:inherit; border:none; border-radius:22px; padding:18px 18px; margin:10px 0; cursor:pointer; display:flex; align-items:center; gap:14px; text-align:left; color:#fff; box-shadow:0 6px 0 rgba(0,0,0,.18); }
.modebtn:active { transform:translateY(4px); box-shadow:0 2px 0 rgba(0,0,0,.18); }
.modebtn div { flex:1; display:flex; flex-direction:column; } .modebtn b { font-size:20px; } .modebtn span { font-size:13px; opacity:.92; font-weight:600; }
.modebtn.write { background:linear-gradient(180deg,#FF8FA3,#FF5A6E); } .modebtn.test { background:linear-gradient(180deg,#56CCF2,#3AA6E0); }
.tiny { color:#8a8492; font-weight:600; font-size:13px; margin-top:10px; }
.map-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; } .map-head h2 { margin:0; font-size:20px; color:#E8455E; }
.back { width:40px; height:40px; border:none; border-radius:14px; background:#fff; cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:0 3px 0 #e2d8ca; color:#544f5b; } .back:active { transform:translateY(2px); }
.q-score { font-weight:800; color:#a37200; background:#FFF3D6; padding:5px 12px; border-radius:14px; }
.act-meta { font-weight:600; color:#8a8492; font-size:14px; } .center { text-align:center; }
.sec-h { font-size:16px; color:#5b5563; margin:14px 4px 8px; }
.chips { display:flex; flex-wrap:wrap; gap:8px; }
.chip { font-family:inherit; border:none; background:#fff; border-radius:14px; padding:8px 12px; font-weight:700; font-size:13px; cursor:pointer; box-shadow:0 3px 0 #e7ddcf; color:#544f5b; } .chip:active { transform:translateY(2px); }
.chip.on { background:#FFC93C; color:#7a4d00; box-shadow:0 3px 0 #d9a400; }
.radgrid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:12px; }
.radcard { position:relative; font-family:inherit; border:none; background:#fff; border-radius:16px; padding:10px 6px 8px; cursor:pointer; box-shadow:0 4px 0 #ecdfce; display:flex; flex-direction:column; align-items:center; gap:1px; }
.radcard:active { transform:translateY(3px); box-shadow:0 1px 0 #ecdfce; } .radcard.learned { background:#EAF9F2; box-shadow:0 4px 0 #b9e6d2; }
.rad-n { font-size:11px; color:#b3aca3; font-weight:700; } .rad-char { font-size:40px; font-weight:800; line-height:1.05; }
.rad-var { font-size:14px; color:#9B5DE5; font-weight:700; margin-top:-2px; } .rad-py { font-size:13px; color:#FF5A6E; font-weight:800; } .rad-en { font-size:12px; color:#8a8492; font-weight:600; text-align:center; }
.rad-tick { position:absolute; top:4px; right:4px; background:#2EC4B6; color:#fff; border-radius:50%; width:18px; height:18px; display:flex; align-items:center; justify-content:center; }
.bigbtn { font-family:inherit; font-size:18px; font-weight:800; color:#fff; background:linear-gradient(180deg,#FF7A8A,#FF5A6E); border:none; border-radius:22px; padding:14px 20px; cursor:pointer; box-shadow:0 6px 0 #d83b54; display:inline-flex; align-items:center; justify-content:center; gap:8px; width:100%; }
.bigbtn:active { transform:translateY(4px); box-shadow:0 2px 0 #d83b54; } .bigbtn.ghost { background:#fff; color:#544f5b; box-shadow:0 5px 0 #e2d8ca; margin-top:10px; } .bigbtn.ghost:active { box-shadow:0 2px 0 #e2d8ca; }
.play-btn { background:linear-gradient(180deg,#FFD24A,#FFB000); box-shadow:0 6px 0 #d68f00; color:#5e3d00; } .play-btn:active { box-shadow:0 2px 0 #d68f00; }
.q-prompt { text-align:center; font-weight:700; font-size:17px; color:#5b5563; margin:6px 0 12px; }
.q-rad { display:flex; flex-direction:column; align-items:center; gap:4px; background:#fff; border:none; border-radius:26px; padding:18px 30px; margin:0 auto 16px; cursor:pointer; box-shadow:0 8px 0 #ecdfce; }
.q-rad-char { font-size:120px; line-height:1; font-weight:800; } .q-rad-var { font-size:14px; color:#9B5DE5; font-weight:700; } .q-rad-py { display:flex; align-items:center; gap:5px; font-size:16px; color:#FF5A6E; font-weight:800; }
.choices { display:flex; flex-direction:column; gap:12px; width:100%; }
.choice { font-family:inherit; border:none; background:#fff; border-radius:18px; padding:15px 18px; cursor:pointer; box-shadow:0 5px 0 #e7ddcf; display:flex; align-items:center; gap:8px; position:relative; }
.choice.center { justify-content:center; } .choice:active { transform:translateY(3px); box-shadow:0 2px 0 #e7ddcf; } .choice-big { font-size:20px; font-weight:800; color:#3a3640; } .choice .choice-ic { margin-left:auto; }
.choice.ok { background:#D9F7E8; box-shadow:0 5px 0 #9fe0c4; color:#10805a; } .choice.ok .choice-ic { color:#10a06f; } .choice.bad { background:#FFE0E3; box-shadow:0 5px 0 #f3b6bc; } .choice.bad .choice-ic { color:#E8455E; }
.overlay { position:fixed; inset:0; z-index:60; display:flex; align-items:center; justify-content:center; background:rgba(45,42,50,.5); padding:16px; }
.trace-modal { background:#fff; border-radius:26px; padding:18px; width:100%; max-width:360px; position:relative; box-shadow:0 14px 40px rgba(0,0,0,.3); display:flex; flex-direction:column; align-items:center; gap:10px; }
.modal-x { position:absolute; top:12px; right:12px; border:none; background:#F0E7DA; border-radius:50%; width:34px; height:34px; cursor:pointer; display:flex; align-items:center; justify-content:center; color:#7a746c; }
