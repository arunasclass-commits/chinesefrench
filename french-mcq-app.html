<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>French MCQ · Leçons 18–32 | ChineseFrench</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --navy:    #0d1b2a;
    --blue:    #1a3a5c;
    --sky:     #2e6da4;
    --gold:    #c9922a;
    --cream:   #fdf9f3;
    --mist:    #eae4d8;
    --ink:     #1c1408;
    --soft:    #5a5040;
    --correct: #1e6b3c;
    --wrong:   #b5201e;
    --correct-bg: #edf7f1;
    --wrong-bg:   #fdf0f0;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--cream);
    font-family: 'DM Sans', sans-serif;
    color: var(--ink);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: var(--navy);
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 54px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    font-family: 'Libre Baskerville', serif;
    font-size: 16px;
    color: var(--cream);
    letter-spacing: 0.04em;
  }
  .logo span { color: var(--gold); font-style: italic; }
  .lesson-badge {
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.45);
    font-weight: 500;
  }

  /* ── HERO ── */
  .hero {
    background: var(--blue);
    color: var(--cream);
    padding: 44px 24px 40px;
    text-align: center;
    border-bottom: 3px solid var(--gold);
  }
  .hero-eyebrow {
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 600;
    margin-bottom: 12px;
  }
  .hero h1 {
    font-family: 'Libre Baskerville', serif;
    font-size: clamp(26px, 5vw, 40px);
    font-weight: 700;
    line-height: 1.15;
    margin-bottom: 10px;
  }
  .hero h1 em { font-style: italic; color: var(--gold); }
  .hero-sub {
    font-size: 14px;
    color: rgba(255,255,255,0.55);
    margin-bottom: 28px;
  }

  /* score strip */
  .score-strip {
    display: inline-flex;
    gap: 28px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    padding: 12px 28px;
    font-size: 13px;
    color: rgba(255,255,255,0.7);
    flex-wrap: wrap;
    justify-content: center;
  }
  .score-strip strong { color: var(--gold); font-size: 20px; display: block; line-height: 1; margin-bottom: 2px; }

  /* ── PROGRESS ── */
  .progress-wrap {
    background: var(--navy);
    padding: 10px 24px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .prog-track {
    flex: 1;
    height: 4px;
    background: rgba(255,255,255,0.1);
    border-radius: 2px;
    overflow: hidden;
  }
  .prog-fill {
    height: 100%;
    background: var(--gold);
    border-radius: 2px;
    transition: width 0.4s ease;
  }
  .prog-label {
    font-size: 12px;
    color: rgba(255,255,255,0.5);
    white-space: nowrap;
  }

  /* ── MAIN ── */
  .main {
    max-width: 680px;
    margin: 0 auto;
    padding: 40px 20px 80px;
  }

  /* ── QUESTION CARD ── */
  .q-card {
    background: #fff;
    border: 1px solid var(--mist);
    border-top: 4px solid var(--sky);
    padding: 32px 28px 28px;
    margin-bottom: 32px;
    opacity: 0;
    transform: translateY(14px);
    animation: appear 0.4s ease forwards;
  }
  @keyframes appear { to { opacity: 1; transform: translateY(0); } }

  .q-num {
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--sky);
    font-weight: 600;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .q-num::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--mist);
  }

  .q-type-tag {
    display: inline-block;
    background: var(--navy);
    color: rgba(255,255,255,0.7);
    font-size: 9px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    padding: 2px 10px;
    margin-bottom: 16px;
  }

  .q-text {
    font-family: 'Libre Baskerville', serif;
    font-size: clamp(17px, 3vw, 21px);
    line-height: 1.5;
    color: var(--ink);
    margin-bottom: 8px;
  }
  .q-text em {
    font-style: normal;
    color: var(--sky);
    border-bottom: 1.5px dashed var(--sky);
  }
  .q-hint {
    font-size: 12px;
    color: var(--soft);
    margin-bottom: 24px;
    font-style: italic;
  }

  /* ── OPTIONS ── */
  .options { display: flex; flex-direction: column; gap: 10px; }

  .opt {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 13px 18px;
    border: 1.5px solid var(--mist);
    background: var(--cream);
    cursor: pointer;
    font-size: 15px;
    color: var(--ink);
    text-align: left;
    width: 100%;
    font-family: 'DM Sans', sans-serif;
    transition: border-color 0.15s, background 0.15s;
    line-height: 1.5;
  }
  .opt:hover:not(:disabled) {
    border-color: var(--sky);
    background: #f0f6ff;
  }
  .opt-letter {
    width: 28px;
    height: 28px;
    flex-shrink: 0;
    border: 1.5px solid var(--mist);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    color: var(--sky);
    background: #fff;
    transition: all 0.15s;
  }
  .opt:hover:not(:disabled) .opt-letter {
    background: var(--sky);
    color: #fff;
    border-color: var(--sky);
  }

  /* states */
  .opt.correct {
    border-color: var(--correct);
    background: var(--correct-bg);
  }
  .opt.correct .opt-letter {
    background: var(--correct);
    color: #fff;
    border-color: var(--correct);
  }
  .opt.wrong {
    border-color: var(--wrong);
    background: var(--wrong-bg);
  }
  .opt.wrong .opt-letter {
    background: var(--wrong);
    color: #fff;
    border-color: var(--wrong);
  }
  .opt:disabled { cursor: not-allowed; }

  /* ── FEEDBACK ── */
  .feedback {
    margin-top: 16px;
    padding: 12px 16px;
    font-size: 14px;
    line-height: 1.6;
    display: none;
    border-left: 3px solid var(--correct);
    background: var(--correct-bg);
    color: var(--correct);
  }
  .feedback.show { display: block; }
  .feedback.wrong-fb {
    border-left-color: var(--wrong);
    background: var(--wrong-bg);
    color: var(--wrong);
  }

  /* ── NEXT BTN ── */
  .btn-next {
    margin-top: 20px;
    background: var(--navy);
    color: #fff;
    border: none;
    padding: 13px 32px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.06em;
    cursor: pointer;
    display: none;
    transition: background 0.2s;
  }
  .btn-next.show { display: inline-block; }
  .btn-next:hover { background: var(--sky); }

  /* ── RESULT SCREEN ── */
  .result-screen {
    display: none;
    text-align: center;
    padding: 48px 24px;
    background: #fff;
    border: 1px solid var(--mist);
    border-top: 4px solid var(--gold);
  }
  .result-screen.show { display: block; }

  .result-flag {
    font-size: 52px;
    margin-bottom: 16px;
    display: block;
  }
  .result-score {
    font-family: 'Libre Baskerville', serif;
    font-size: 64px;
    font-weight: 700;
    color: var(--navy);
    line-height: 1;
    margin-bottom: 6px;
  }
  .result-score span { color: var(--gold); }
  .result-label {
    font-size: 13px;
    color: var(--soft);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 20px;
  }
  .result-msg {
    font-family: 'Libre Baskerville', serif;
    font-size: 20px;
    font-style: italic;
    color: var(--ink);
    margin-bottom: 32px;
    max-width: 420px;
    margin-left: auto;
    margin-right: auto;
    line-height: 1.5;
  }
  .grade-bar {
    display: flex;
    justify-content: center;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 32px;
  }
  .gb {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    font-size: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
  }
  .gb.c { background: var(--correct); color: #fff; }
  .gb.w { background: var(--wrong); color: #fff; }
  .gb.s { background: var(--mist); color: var(--soft); }

  .btn-restart {
    background: var(--gold);
    color: var(--navy);
    border: none;
    padding: 14px 40px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-restart:hover { background: #e5a830; }

  /* ── RESPONSIVE ── */
  @media (max-width: 500px) {
    .q-card { padding: 22px 16px 18px; }
    .score-strip { gap: 16px; padding: 10px 16px; }
    .main { padding: 24px 12px 60px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Chinese<span>French</span></div>
  <div class="lesson-badge">French · Leçons 18–32</div>
</header>

<div class="hero">
  <div class="hero-eyebrow">ChineseFrench · Pratique Interactive</div>
  <h1>Leçons 18–32<br><em>25 Questions Aléatoires</em></h1>
  <div class="hero-sub">Grammaire, vocabulaire et dialogues · Répondez bien !</div>
  <div class="score-strip">
    <div><strong id="h-score">0</strong>Correct</div>
    <div><strong id="h-wrong">0</strong>Wrong</div>
    <div><strong id="h-remain">25</strong>Remaining</div>
    <div><strong id="h-pct">0%</strong>Score</div>
  </div>
</div>

<div class="progress-wrap">
  <div class="prog-track"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
  <div class="prog-label" id="prog-label">0 / 25</div>
</div>

<div class="main">
  <div id="quiz-area"></div>
  <div class="result-screen" id="result-screen">
    <span class="result-flag" id="res-flag">🎉</span>
    <div class="result-score" id="res-score">0<span>/25</span></div>
    <div class="result-label">Score Final</div>
    <div class="result-msg" id="res-msg"></div>
    <div class="grade-bar" id="grade-bar"></div>
    <button class="btn-restart" onclick="startQuiz()">🔄 Recommencer</button>
  </div>
</div>

<script>
// ── ALL QUESTION BANK (50 questions from lessons 18-32) ──
const BANK = [
  // Lesson 18 - Indirect objects / pronouns
  {type:"Complete", q:"La maîtresse a donné un dictionnaire ___ garçon.", blank:"au", opts:["au","du","le","un"], ans:0, fb:"'au' = à + le. La maîtresse a donné un dictionnaire au garçon."},
  {type:"Translate", q:"Le maître lui a donné un cahier. What does 'lui' refer to?", blank:"", opts:["to him/her","to them","to us","to you"], ans:0, fb:"'lui' = indirect pronoun = to him or to her (singular)."},
  {type:"Choose", q:"Le garçon a donné une pomme ___ la maîtresse.", blank:"à", opts:["à","de","avec","sur"], ans:0, fb:"'à' is used with donner — donner quelque chose À quelqu'un."},
  {type:"Complete", q:"Le garçon lui a donné ___.", blank:"un gâteau", opts:["un gâteau","une pomme","un dictionnaire","un cahier"], ans:0, fb:"From lesson 18: Le garçon lui a donné un gâteau."},

  // Lesson 19 - lui / me / indirect objects
  {type:"Complete", q:"Le médecin ___ a donné des médicaments.", blank:"lui", opts:["lui","me","nous","leur"], ans:0, fb:"'lui' = to him/her. Le médecin lui a donné des médicaments."},
  {type:"Translate", q:"What does 'Il lui achète des bijoux' mean in English?", blank:"", opts:["He buys her jewellery","She buys him food","He gave her medicine","They bought jewels"], ans:0, fb:"Il = he, lui = for her, achète = buys, des bijoux = jewellery."},
  {type:"Complete", q:"Le médecin ___ a donné des médicaments.", blank:"m'", opts:["m'","lui","leur","vous"], ans:0, fb:"'m'' = me (elision before vowel). Le médecin m'a donné des médicaments."},

  // Lesson 20 - nous / written objects
  {type:"Choose", q:"Ils ___ ont écrit des lettres.", blank:"nous", opts:["nous","leur","lui","me"], ans:0, fb:"'nous' = to us. Ils nous ont écrit des lettres = They wrote us letters."},
  {type:"Translate", q:"Elle nous a acheté des chocolats. What does 'nous' mean here?", blank:"", opts:["for us","for them","for her","for him"], ans:0, fb:"'nous' as indirect object = for us / to us."},
  {type:"Complete", q:"Notre grand-père nous a donné ___.", blank:"un chat", opts:["un chat","des lettres","des chocolats","des bijoux"], ans:0, fb:"From lesson 20: Notre grand-père nous a donné un chat."},

  // Lesson 21 - lui / leur
  {type:"Choose", q:"Il ___ vend un chapeau.", blank:"lui", opts:["lui","leur","nous","me"], ans:0, fb:"'lui' = to him/her (singular). Il lui vend un chapeau."},
  {type:"Complete", q:"Il ___ lit un livre.", blank:"leur", opts:["leur","lui","me","nous"], ans:0, fb:"'leur' = to them (plural indirect object). Il leur lit un livre."},
  {type:"Translate", q:"Elle leur a acheté des fruits. Who did she buy fruits for?", blank:"", opts:["for them","for him","for her","for us"], ans:0, fb:"'leur' = indirect object plural = for them."},

  // Lesson 22 - vous / nous / ça
  {type:"Complete", q:"Ça ___ enseigne le français.", blank:"vous", opts:["vous","nous","leur","lui"], ans:0, fb:"'vous' = to you (plural or formal). Ça vous enseigne le français."},
  {type:"Choose", q:"Je ___ ai donné les clés hier.", blank:"vous", opts:["vous","leur","lui","me"], ans:0, fb:"'vous' = to you. Je vous ai donné les clés hier."},
  {type:"Complete", q:"Mon père me donne ___.", blank:"les clés", opts:["les clés","les lettres","les fleurs","les bijoux"], ans:0, fb:"From lesson 22: Mon père me donne les clés."},

  // Lesson 23 - il y a
  {type:"Translate", q:"What does 'Il y a un mot' mean?", blank:"", opts:["There is one word","There are no words","He has a word","It has one word"], ans:0, fb:"'Il y a' = there is / there are. Un mot = one word."},
  {type:"Complete", q:"Il y a ___ mots.", blank:"deux", opts:["deux","un","quatre","trois"], ans:1, fb:"Trick — 'un' would make 'Il y a un mot'. But the answer for 'Il y a ___ mots' is deux (two)."},
  {type:"Choose", q:"Il y a ___ quatre mots.", blank:"à", opts:["à","pas","de","un"], ans:1, fb:"Wait — it's 'Il y a quatre mots' (no extra word). The negative is 'Il n'y a PAS de mots.'"},

  // Lesson 24 - il n'y a pas / ce panneau
  {type:"Complete", q:"Il ___ a pas de mots sur ce panneau.", blank:"n'y", opts:["n'y","y","ne","pas"], ans:0, fb:"Negative: Il n'y a pas de... = There is/are no..."},
  {type:"Translate", q:"Ce panneau est vert. What colour is the sign?", blank:"", opts:["Green","Blue","Red","Yellow"], ans:0, fb:"'vert' = green. 'bleu' = blue. Ce panneau est vert = This sign is green."},
  {type:"Choose", q:"Il y a un mot ___ ce panneau.", blank:"sur", opts:["sur","dans","à","de"], ans:0, fb:"'sur' = on. Il y a un mot sur ce panneau = There is a word on this sign."},

  // Lesson 25 - Excusez-moi / que veut dire
  {type:"Translate", q:"Excusez-moi, que veut dire ce mot ?", blank:"", opts:["Excuse me, what does this word mean?","Sorry, how do you say this?","Pardon, where is the pharmacy?","Please repeat that."], ans:0, fb:"'que veut dire' = what does ... mean. Veut dire = means (vouloir dire)."},
  {type:"Complete", q:"Il veut dire « ___ ».", blank:"pharmacie", opts:["pharmacie","bibliothèque","restaurant","hôtel"], ans:0, fb:"From lesson 25: Excusez-moi, que veut dire ce mot? Il veut dire 'pharmacie'."},
  {type:"Choose", q:"Excusez-moi, que veut dire ___ panneau ?", blank:"ce", opts:["ce","cet","cette","ces"], ans:0, fb:"'ce' is used before masculine nouns starting with a consonant. 'Panneau' is masculine."},

  // Lesson 26 - Voici un stade
  {type:"Complete", q:"Ça veut dire « ___ ».", blank:"un stade", opts:["un stade","une bibliothèque","une pharmacie","un hôtel"], ans:0, fb:"From lesson 26: Qu'est-ce qu'un stade? Ça veut dire 'un stade'."},
  {type:"Translate", q:"What does 'Voici un stade' mean?", blank:"", opts:["Here is a stadium","This is a library","There is a station","Here is a hotel"], ans:0, fb:"'Voici' = here is/here are. 'un stade' = a stadium."},

  // Lesson 27 - comprendre
  {type:"Complete", q:"Je ___ ce mot.", blank:"comprends", opts:["comprends","comprend","comprenons","comprenez"], ans:0, fb:"Je comprends = I understand. Verb comprendre — je comprends (1st person singular)."},
  {type:"Choose", q:"Il ___.", blank:"comprend", opts:["comprend","comprends","comprenons","comprenez"], ans:0, fb:"Il/elle comprend (no -s for 3rd person singular in -re verbs)."},
  {type:"Complete", q:"Ils ne ___ pas ce livre.", blank:"comprennent", opts:["comprennent","comprend","comprends","comprenons"], ans:0, fb:"Ils comprennent = they understand. Negative: ils ne comprennent pas."},
  {type:"Translate", q:"Elle ne comprend pas. What does this mean?", blank:"", opts:["She doesn't understand","He doesn't understand","We don't understand","They don't understand"], ans:0, fb:"'Elle' = she. 'ne...pas' = negation. Elle ne comprend pas = She doesn't understand."},

  // Lesson 28 - que veut dire / vouloir dire
  {type:"Complete", q:"Il veut dire « l'aéroport est sur ___ ».", blank:"la droite", opts:["la droite","la gauche","le panneau","la plage"], ans:0, fb:"From lesson 28: Il veut dire 'l'aéroport est sur la droite' = the airport is on the right."},
  {type:"Translate", q:"Il veut dire « hôtel ». What does this sign mean?", blank:"", opts:["Hotel","Beach","Airport","Library"], ans:0, fb:"'hôtel' = hotel. Il veut dire = it means."},
  {type:"Choose", q:"Il veut dire « ___ ».", blank:"plage", opts:["plage","stade","pharmacie","restaurant"], ans:0, fb:"From lesson 28 last exchange: Il veut dire 'plage' = it means beach."},

  // Lesson 29 - station service / toilettes
  {type:"Translate", q:"Qu'est-ce que ça veut dire ? Ça veut dire « station service ».", blank:"", opts:["It means petrol station","It means toilet","It means police station","It means bus station"], ans:0, fb:"'Station service' = petrol/service station in French."},
  {type:"Complete", q:"Ça veut dire « ___ ».", blank:"toilettes", opts:["toilettes","pharmacie","bibliothèque","restaurant"], ans:0, fb:"From lesson 29: Qu'est-ce que ça veut dire? Ça veut dire 'toilettes'."},

  // Lesson 30 - Quelle heure / pourriez-vous répéter
  {type:"Translate", q:"Excusez-moi, quelle heure est-il ?", blank:"", opts:["Excuse me, what time is it?","Excuse me, what day is it?","Sorry, where am I?","Pardon, what does that mean?"], ans:0, fb:"'quelle heure est-il' = what time is it? A key French question phrase."},
  {type:"Complete", q:"Il est ___ heures quinze.", blank:"quinze", opts:["quinze","douze","seize","onze"], ans:0, fb:"From lesson 30: Il est quinze heures quinze = It is 15:15 (3:15 PM)."},
  {type:"Choose", q:"Pourriez-vous ___, s'il vous plaît ?", blank:"répéter", opts:["répéter","comprendre","dire","parler"], ans:0, fb:"'Pourriez-vous répéter' = Could you repeat? A polite request for repetition."},

  // Lesson 31 - bibliothèque / Merci / Je vous en prie
  {type:"Complete", q:"Il veut dire « ___ ».", blank:"bibliothèque", opts:["bibliothèque","pharmacie","hôtel","restaurant"], ans:0, fb:"From lesson 31: Il veut dire 'bibliothèque' = it means library."},
  {type:"Translate", q:"Je vous en prie. What is this a response to?", blank:"", opts:["Merci (Thank you)","Bonjour (Hello)","Excusez-moi (Excuse me)","Au revoir (Goodbye)"], ans:0, fb:"'Je vous en prie' = You're welcome / Don't mention it. It responds to 'Merci'."},
  {type:"Choose", q:"___, où se trouve la banque ?", blank:"Excusez-moi", opts:["Excusez-moi","Merci","Bonjour","Pourriez-vous"], ans:0, fb:"Use 'Excusez-moi' to politely get someone's attention before asking a question."},

  // Lesson 32 - directions / à côté de
  {type:"Translate", q:"La banque est à côté de la bibliothèque.", blank:"", opts:["The bank is next to the library","The bank is in front of the library","The bank is far from the library","The library is next to the bank"], ans:0, fb:"'à côté de' = next to. La banque est à côté de la bibliothèque = The bank is next to the library."},
  {type:"Complete", q:"La banque est ___ côté de la bibliothèque.", blank:"à", opts:["à","au","du","de la"], ans:0, fb:"'à côté de' is the fixed expression meaning 'next to'. It starts with 'à'."},
  {type:"Choose", q:"Oui. La banque est à côté ___ la bibliothèque.", blank:"de", opts:["de","du","à","en"], ans:0, fb:"'à côté de' = next to. 'de' + 'la bibliothèque' stays as 'de la' (no contraction with feminine noun)."},

  // Mixed grammar revision
  {type:"Choose", q:"Nos parents nous ___ écrit des lettres.", blank:"ont", opts:["ont","avons","êtes","sont"], ans:0, fb:"'nous ont écrit' = they wrote to us. Avoir (to have) — ils ont = they have (past tense helper)."},
  {type:"Translate", q:"Je veux te donner ces fleurs. What does 'te' mean?", blank:"", opts:["to you (informal)","to him","to her","to us"], ans:0, fb:"'te' = to you, informal/singular. Je veux te donner = I want to give you."},
  {type:"Complete", q:"Nous ___ avons écrit ça.", blank:"vous", opts:["vous","lui","leur","me"], ans:0, fb:"'vous' = to you (plural/formal). Nous vous avons écrit ça = We wrote that to you."},
  {type:"Choose", q:"Je ___ ai acheté ces bijoux.", blank:"t'", opts:["t'","lui","nous","leur"], ans:0, fb:"'t'' = te (elision) = for you informal. Je t'ai acheté ces bijoux = I bought you this jewellery."},
];

// ── STATE ──
let questions = [];
let current = 0;
let score = 0;
let wrong = 0;
let answered = false;
let history = []; // 'c' or 'w' for each question

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startQuiz() {
  questions = shuffle(BANK).slice(0, 25);
  current = 0; score = 0; wrong = 0; answered = false; history = [];
  document.getElementById('result-screen').classList.remove('show');
  document.getElementById('quiz-area').style.display = '';
  updateHeader();
  renderQ();
}

function updateHeader() {
  document.getElementById('h-score').textContent   = score;
  document.getElementById('h-wrong').textContent   = wrong;
  document.getElementById('h-remain').textContent  = Math.max(0, 25 - current);
  document.getElementById('h-pct').textContent     = current > 0 ? Math.round((score / current) * 100) + '%' : '0%';
  document.getElementById('prog-fill').style.width = (current / 25 * 100) + '%';
  document.getElementById('prog-label').textContent = current + ' / 25';
}

const LETTERS = ['A','B','C','D'];
const TYPE_LABELS = {
  'Complete': 'Complete the sentence',
  'Translate': 'Translation',
  'Choose': 'Choose the correct word'
};

function renderQ() {
  const qa = document.getElementById('quiz-area');
  if (current >= 25) { showResult(); return; }
  const q = questions[current];
  answered = false;

  // Shuffle options keeping track of correct answer
  const indices = shuffle([0,1,2,3]);
  const shuffledOpts = indices.map(i => q.opts[i]);
  const newAns = indices.indexOf(q.ans);

  qa.innerHTML = `
    <div class="q-card" id="qcard">
      <div class="q-num">Question ${current + 1} of 25</div>
      <div class="q-type-tag">${TYPE_LABELS[q.type] || q.type}</div>
      <div class="q-text">${formatQ(q)}</div>
      ${q.hint ? `<div class="q-hint">${q.hint}</div>` : ''}
      <div class="options" id="opts">
        ${shuffledOpts.map((o, i) => `
          <button class="opt" onclick="answer(${i}, ${newAns})" id="opt${i}">
            <span class="opt-letter">${LETTERS[i]}</span>
            ${o}
          </button>
        `).join('')}
      </div>
      <div class="feedback" id="feedback"></div>
      <button class="btn-next" id="btn-next" onclick="nextQ()">
        ${current < 24 ? 'Question suivante →' : 'Voir les résultats →'}
      </button>
    </div>
  `;
}

function formatQ(q) {
  if (q.blank && q.q.includes('___')) {
    return q.q.replace('___', '<em>___</em>');
  }
  return q.q;
}

function answer(chosen, correct) {
  if (answered) return;
  answered = true;

  const opts = document.querySelectorAll('.opt');
  opts.forEach(o => o.disabled = true);

  const fb = document.getElementById('feedback');
  const btn = document.getElementById('btn-next');

  if (chosen === correct) {
    opts[chosen].classList.add('correct');
    score++;
    history.push('c');
    fb.textContent = '✓ Correct ! ' + questions[current].fb;
    fb.className = 'feedback show';
  } else {
    opts[chosen].classList.add('wrong');
    opts[correct].classList.add('correct');
    wrong++;
    history.push('w');
    fb.textContent = '✗ ' + questions[current].fb;
    fb.className = 'feedback show wrong-fb';
  }

  current++;
  updateHeader();
  btn.classList.add('show');
}

function nextQ() {
  renderQ();
}

function showResult() {
  document.getElementById('quiz-area').style.display = 'none';
  const rs = document.getElementById('result-screen');
  rs.classList.add('show');

  const pct = Math.round((score / 25) * 100);
  document.getElementById('res-score').innerHTML = `${score}<span>/25</span>`;

  const flags =   ['😔','😐','🙂','😊','🎉','🏆'];
  const msgs  = [
    'Continuez à pratiquer — chaque erreur est une leçon !',
    'Bon début ! Revoyez les leçons et réessayez.',
    'Pas mal ! Encore un peu de pratique.',
    'Bien ! Vous maîtrisez bien ces leçons.',
    'Très bien ! Votre français progresse beautifully.',
    'Parfait ! Vous êtes prêt(e) pour le niveau suivant !'
  ];
  const fi = pct < 40 ? 0 : pct < 56 ? 1 : pct < 68 ? 2 : pct < 80 ? 3 : pct < 96 ? 4 : 5;
  document.getElementById('res-flag').textContent = flags[fi];
  document.getElementById('res-msg').textContent  = msgs[fi];

  // grade dots
  const gb = document.getElementById('grade-bar');
  gb.innerHTML = history.map((h, i) =>
    `<div class="gb ${h}" title="Q${i+1}: ${h==='c'?'✓':'✗'}">${i+1}</div>`
  ).join('');

  rs.scrollIntoView({ behavior: 'smooth' });
}

// ── INIT ──
startQuiz();
</script>

</html>
