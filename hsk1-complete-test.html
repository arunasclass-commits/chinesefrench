<html lang="en">
<head>
<meta charset="UTF-8">

<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Noto+Sans+SC:wght@400;500;700&display=swap');
:root{--ink:#1a1a2e;--red:#e63946;--gold:#ffd166;--teal:#06d6a0;--blue:#118ab2;--purple:#7b2d8b;--orange:#f4a261;--light:#f0f4ff;--card:#fff;--border:#e2e8f0;--muted:#8892a4;--shadow:0 8px 32px rgba(0,0,0,0.10)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;background:var(--light);color:var(--ink);min-height:100vh}

/* HERO */
.hero{background:linear-gradient(135deg,#1a1a2e 0%,#2d1f5e 50%,#a8324a 100%);color:#fff;padding:28px 20px 40px;text-align:center;position:relative;overflow:hidden}
.hero::before{content:'汉语';position:absolute;font-family:'Noto Sans SC',sans-serif;font-size:160px;font-weight:700;color:rgba(255,255,255,0.04);top:0;left:50%;transform:translateX(-50%);pointer-events:none}
.hero-badge{display:inline-block;background:rgba(255,209,102,0.2);border:1px solid rgba(255,209,102,0.5);color:var(--gold);font-size:11px;font-weight:800;letter-spacing:2px;text-transform:uppercase;padding:5px 14px;border-radius:20px;margin-bottom:10px}
.hero h1{font-size:clamp(20px,5vw,34px);font-family:'Noto Sans SC',sans-serif;font-weight:700;margin-bottom:4px}
.hero-sub{font-size:13px;color:rgba(255,255,255,0.7);margin-bottom:20px}

/* SCORE PILLS */
.score-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:12px}
.score-pill{background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);border-radius:18px;padding:7px 14px;text-align:center;min-width:78px}
.score-pill .pv{font-size:18px;font-weight:900}
.score-pill .pl{font-size:9px;opacity:0.7;text-transform:uppercase;letter-spacing:0.5px}
.score-pill.overall{background:rgba(255,209,102,0.25);border-color:rgba(255,209,102,0.5)}

/* FILTER ROW */
.filter-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;padding:12px 16px;background:#fff;border-bottom:2px solid var(--border)}
.filter-btn{padding:6px 14px;border:2px solid var(--border);border-radius:20px;background:#fff;font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;cursor:pointer;color:var(--muted);transition:all 0.2s}
.filter-btn:hover,.filter-btn.active{background:var(--purple);color:#fff;border-color:var(--purple)}

/* TABS */
.tabs{display:flex;background:#fff;border-bottom:2px solid var(--border);overflow-x:auto;position:sticky;top:0;z-index:50;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
.tab{flex:1;min-width:75px;padding:13px 6px;border:none;background:none;font-family:'Nunito',sans-serif;font-size:12px;font-weight:800;color:var(--muted);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all 0.2s;text-align:center}
.tab.active{color:var(--purple);border-bottom-color:var(--purple)}
.tab .dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--teal);margin-left:3px;vertical-align:middle;display:none}
.tab.done .dot{display:inline-block}

/* CONTENT */
.content{max-width:700px;margin:0 auto;padding:20px 16px 60px}
.section{display:none}.section.active{display:block}

/* CARD */
.card{background:var(--card);border-radius:18px;padding:22px;box-shadow:var(--shadow);margin-bottom:14px}

/* PROGRESS */
.prog-wrap{background:var(--border);border-radius:6px;height:6px;margin-bottom:16px}
.prog-fill{height:6px;border-radius:6px;transition:width 0.4s}
.qmeta{display:flex;justify-content:space-between;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:12px}

/* PHRASE DISPLAY */
.phrase-zh{font-family:'Noto Sans SC',sans-serif;font-size:42px;font-weight:700;color:var(--ink);text-align:center;margin-bottom:6px}
.phrase-py{font-size:18px;color:var(--blue);font-weight:700;text-align:center;margin-bottom:4px}
.phrase-en{font-size:13px;color:var(--muted);text-align:center;margin-bottom:16px}
.lesson-tag{display:inline-block;background:#f3e8ff;color:var(--purple);font-size:10px;font-weight:800;padding:2px 8px;border-radius:10px;text-align:center;margin:0 auto 12px;display:block;width:fit-content;margin:0 auto 14px}

/* BUTTONS */
.btn-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:4px}
.btn{padding:11px 20px;border:none;border-radius:12px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;cursor:pointer;transition:transform 0.15s}
.btn:hover{transform:scale(1.03)}
.btn-play{background:var(--blue);color:#fff}
.btn-ok{background:var(--teal);color:#fff}
.btn-skip{background:#f1f5f9;color:var(--muted)}
.btn-check{background:var(--purple);color:#fff;width:100%}
.btn-nxt{background:var(--teal);color:#fff;width:100%}
.btn-retry{background:var(--ink);color:#fff}
.btn-sb{background:var(--gold);color:var(--ink)}

/* LISTEN OPTS */
.l-opts{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:6px}
.l-opt{background:#fff;border:2px solid var(--border);border-radius:12px;padding:12px 8px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;cursor:pointer;text-align:center;color:var(--ink);line-height:1.4;transition:all 0.15s}
.l-opt:hover{border-color:var(--blue);background:var(--light)}
.l-opt.correct{background:#d1fae5!important;border-color:#059669!important;color:#065f46!important}
.l-opt.wrong{background:#fee2e2!important;border-color:#dc2626!important;color:#991b1b!important}

/* READ OPTS */
.r-opts{display:flex;flex-direction:column;gap:8px;margin-top:10px}
.r-opt{background:#fff;border:2px solid var(--border);border-radius:12px;padding:11px 14px;font-family:'Noto Sans SC',sans-serif;font-size:20px;font-weight:700;cursor:pointer;text-align:left;color:var(--ink);transition:all 0.15s}
.r-opt:hover{border-color:var(--blue);background:var(--light)}
.r-opt.correct{background:#d1fae5!important;border-color:#059669!important;color:#065f46!important}
.r-opt.wrong{background:#fee2e2!important;border-color:#dc2626!important;color:#991b1b!important}

/* WRITE */
.w-input{width:100%;border:2px solid var(--border);border-radius:12px;padding:14px;font-family:'Nunito',sans-serif;font-size:20px;text-align:center;outline:none;margin:12px 0;transition:border-color 0.2s}
.w-input:focus{border-color:var(--purple)}
.w-result{padding:11px;border-radius:10px;text-align:center;font-size:13px;font-weight:700;display:none;margin-bottom:10px}
.w-result.ok{background:#d1fae5;color:#065f46}
.w-result.err{background:#fee2e2;color:#991b1b}

/* SPEAK DOTS */
.sdots{display:flex;gap:5px;justify-content:center;margin-bottom:12px;flex-wrap:wrap}
.sdot{width:9px;height:9px;border-radius:50%;background:var(--border);transition:background 0.3s;flex-shrink:0}
.sdot.done{background:var(--teal)}.sdot.cur{background:var(--red)}

/* RESULT */
.result-card{text-align:center;padding:28px 16px}
.res-emoji{font-size:52px}
.res-pct{font-size:52px;font-weight:900;margin:8px 0}
.res-sub{font-size:13px;color:var(--muted);font-weight:600;margin-bottom:20px}

/* SCOREBOARD */
.sb-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.sb-lbl{font-size:12px;font-weight:700;width:100px;flex-shrink:0}
.sb-bar-wrap{flex:1;background:#f1f5f9;border-radius:6px;height:9px;overflow:hidden}
.sb-bar{height:100%;border-radius:6px;transition:width 0.8s ease}
.sb-sc{font-size:12px;font-weight:800;width:36px;text-align:right}
.saved{display:block;width:fit-content;background:#d1fae5;color:#065f46;font-size:11px;font-weight:700;padding:4px 12px;border-radius:20px;margin:10px auto}

@media(max-width:480px){.l-opts{grid-template-columns:1fr}.phrase-zh{font-size:34px}}
</style>
</head>

</div>

<div class="tabs">

  <button class="tab" id="tS" onclick="showTab('S')">🎤 Speak <span class="dot"></span></button>

  <button class="tab" id="tSB" onclick="showTab('SB')">🏆 Scores</button>
</div>

<div class="content">

  {zh:'觉得',py:'juéde',en:'Feel / think',l:14},
  {zh:'家人',py:'jiārén',en:'Family member',l:14},
  // L15
  {zh:'天气',py:'tiānqì',en:'Weather',l:15},
  {zh:'冷',py:'lěng',en:'Cold',l:15},
  {zh:'热',py:'rè',en:'Hot',l:15},
  {zh:'下雨',py:'xià yǔ',en:'Rain',l:15},
  {zh:'下雪',py:'xià xuě',en:'Snow',l:15},
  {zh:'太',py:'tài',en:'Too / extremely',l:15},
  {zh:'感冒',py:'gǎnmào',en:'Cold / flu',l:15},
  {zh:'看病',py:'kànbìng',en:'See a doctor',l:15},
  {zh:'舒服',py:'shūfu',en:'Comfortable / well',l:15},
  {zh:'多喝热水',py:'duō hē rè shuǐ',en:'Drink more hot water',l:15},
];

const SCORE_KEY='cf_hsk1_complete_test';
let scores=JSON.parse(localStorage.getItem(SCORE_KEY)||'{}');
let currentFilter='all';
let activeVocab=[...ALL_VOCAB];

function saveScores(){
  localStorage.setItem(SCORE_KEY,JSON.stringify(scores));
  updatePills();
}
function updatePills(){
  const f=v=>v!==undefined?v+'%':'—';
  document.getElementById('spL').textContent=f(scores.L);
  document.getElementById('spS').textContent=f(scores.S);
  document.getElementById('spR').textContent=f(scores.R);
  document.getElementById('spW').textContent=f(scores.W);
  const vals=[scores.L,scores.S,scores.R,scores.W].filter(x=>x!==undefined);
  document.getElementById('spO').textContent=vals.length?Math.round(vals.reduce((a,b)=>a+b,0)/vals.length)+'%':'—';
}
updatePills();

function speak(t,rate=0.75){
  if(!window.speechSynthesis)return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(t);
  u.lang='zh-CN';u.rate=rate;u.pitch=1.1;
  const v=speechSynthesis.getVoices().find(x=>x.lang.startsWith('zh'));
  if(v)u.voice=v;
  speechSynthesis.speak(u);
}
if(speechSynthesis.onvoiceschanged!==undefined)speechSynthesis.onvoiceschanged=()=>{};

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

function setFilter(val,btn){
  currentFilter=val;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  activeVocab=val==='all'?[...ALL_VOCAB]:ALL_VOCAB.filter(w=>w.l===val);
  // reset all states
  lDone=false;sDoneAll=false;rDone=false;wDone=false;
  delete scores.L;delete scores.S;delete scores.R;delete scores.W;
  saveScores();
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('done'));
  showTab('L');
}

function showTab(id){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('sec-'+id).classList.add('active');
  document.getElementById('t'+id).classList.add('active');
  if(id==='L')initListen();
  if(id==='S')initSpeak();
  if(id==='R')initRead();
  if(id==='W')initWrite();
  if(id==='SB')renderSB();
}
function markDone(id){document.getElementById('t'+id).classList.add('done');}

function getOpts(correct,pool,n=4){
  const others=shuffle(pool.filter(x=>x.zh!==correct.zh)).slice(0,n-1);
  return shuffle([correct,...others]);
}

// ── LISTENING ─────────────────────────────────────────────────
let lPool=[],lIdx=0,lScore=0,lDone=false;
function initListen(){
  if(lDone)return;
  lPool=shuffle([...activeVocab]);lIdx=0;lScore=0;renderLQ();
}
function renderLQ(){
  const p=lPool[lIdx];
  const opts=getOpts(p,lPool);
  document.getElementById('listenBody').innerHTML=`
    <div class="card">
      <div class="qmeta"><span>Q ${lIdx+1}/${lPool.length}</span><span style="color:var(--teal)">✅ ${lScore}/${lIdx}</span></div>
      <div class="prog-wrap"><div class="prog-fill" style="width:${Math.round(lIdx/lPool.length*100)}%;background:linear-gradient(90deg,var(--blue),var(--teal))"></div></div>
      <div class="lesson-tag">Lesson ${p.l}</div>
      <div style="text-align:center;margin-bottom:14px">
        <button class="btn btn-play" onclick="speak('${p.zh.replace(/'/g,"\\'")}')">🔊 Play Audio</button>
      </div>
      <div style="text-align:center;font-size:14px;font-weight:700;color:var(--ink);margin-bottom:10px">Choose the correct pinyin + meaning:</div>
      <div class="l-opts">
        ${opts.map((o,i)=>`<button class="l-opt" id="lo${i}" onclick="answerL(${i},'${o.zh.replace(/'/g,"\\'")}','${p.zh.replace(/'/g,"\\'")}')">${o.py}<br><span style="font-size:11px;color:var(--muted)">${o.en}</span></button>`).join('')}
      </div>
    </div>`;
  setTimeout(()=>speak(p.zh),400);
}
function answerL(i,chosen,correct){
  const ok=chosen===correct;
  if(ok)lScore++;
  const p=lPool[lIdx];
  const opts=getOpts(p,lPool);
  opts.forEach((o,j)=>{
    const b=document.getElementById('lo'+j);if(!b)return;
    b.disabled=true;
    if(o.zh===correct)b.classList.add('correct');
    else if(j===i&&!ok)b.classList.add('wrong');
  });
  setTimeout(()=>{
    lIdx++;
    if(lIdx>=lPool.length){
      lDone=true;scores.L=Math.round(lScore/lPool.length*100);saveScores();markDone('L');
      document.getElementById('listenBody').innerHTML=resultHTML('🎧',scores.L,lScore,lPool.length,'Listening','L','S');
    }else renderLQ();
  },900);
}

// ── SPEAKING ──────────────────────────────────────────────────
let sPool=[],sIdx=0,sDone=0,sDoneAll=false;
function initSpeak(){
  if(sDoneAll)return;
  sPool=shuffle([...activeVocab]);sIdx=0;sDone=0;
  renderSDots();renderSQ();
}
function renderSDots(){
  const shown=Math.min(sPool.length,40);
  document.getElementById('speakDots').innerHTML=sPool.slice(0,shown).map((_,i)=>
    `<div class="sdot ${i<sDone?'done':i===sIdx?'cur':''}"></div>`).join('');
}
function renderSQ(){
  const p=sPool[sIdx];
  document.getElementById('speakBody').innerHTML=`
    <div class="card">
      <div class="qmeta"><span>${sIdx+1}/${sPool.length}</span><span style="color:var(--teal)">✅ ${sDone}</span></div>
      <div class="prog-wrap"><div class="prog-fill" style="width:${Math.round(sIdx/sPool.length*100)}%;background:linear-gradient(90deg,var(--red),var(--orange))"></div></div>
      <div class="lesson-tag">Lesson ${p.l}</div>
      <div class="phrase-zh">${p.zh}</div>
      <div class="phrase-py">${p.py}</div>
      <div class="phrase-en">${p.en}</div>
      <div class="btn-row">
        <button class="btn btn-play" onclick="speak('${p.zh.replace(/'/g,"\\'")}',0.65)">🔊 Hear</button>
        <button class="btn btn-ok" onclick="gotItS()">✅ Got It!</button>
        <button class="btn btn-skip" onclick="skipS()">⏭ Skip</button>
      </div>
    </div>`;
  setTimeout(()=>speak(p.zh,0.65),300);
}
function gotItS(){sDone++;nextS();}
function skipS(){nextS();}
function nextS(){
  sIdx++;
  if(sIdx>=sPool.length){
    sDoneAll=true;scores.S=Math.round(sDone/sPool.length*100);saveScores();markDone('S');
    document.getElementById('speakDots').innerHTML='';
    document.getElementById('speakBody').innerHTML=resultHTML('🎤',scores.S,sDone,sPool.length,'Speaking','S','R');
    return;
  }
  renderSDots();renderSQ();
}

// ── READING ───────────────────────────────────────────────────
// Show pinyin + English → pick the Chinese characters
let rPool=[],rIdx=0,rScore=0,rDone=false;
function initRead(){
  if(rDone)return;
  rPool=shuffle([...activeVocab]);rIdx=0;rScore=0;renderRQ();
}
function renderRQ(){
  const p=rPool[rIdx];
  const opts=getOpts(p,rPool);
  document.getElementById('readBody').innerHTML=`
    <div class="card">
      <div class="qmeta"><span>Q ${rIdx+1}/${rPool.length}</span><span style="color:var(--teal)">✅ ${rScore}/${rIdx}</span></div>
      <div class="prog-wrap"><div class="prog-fill" style="width:${Math.round(rIdx/rPool.length*100)}%;background:linear-gradient(90deg,var(--orange),var(--gold))"></div></div>
      <div class="lesson-tag">Lesson ${p.l}</div>
      <div style="text-align:center;margin-bottom:4px">
        <div style="font-size:12px;color:var(--muted);font-weight:700;margin-bottom:8px">Which characters match this pinyin?</div>
        <div style="font-size:26px;font-weight:700;color:var(--blue);font-family:'Nunito',sans-serif;margin-bottom:2px">${p.py}</div>
        <div style="font-size:13px;color:var(--muted)">${p.en}</div>
      </div>
      <div class="r-opts">
        ${opts.map((o,i)=>`<button class="r-opt" id="ro${i}" onclick="answerR(${i},'${o.zh.replace(/'/g,"\\'")}','${p.zh.replace(/'/g,"\\'")}')">${o.zh}</button>`).join('')}
      </div>
    </div>`;
}
function answerR(i,chosen,correct){
  const ok=chosen===correct;
  if(ok)rScore++;
  const p=rPool[rIdx];
  const opts=getOpts(p,rPool);
  opts.forEach((o,j)=>{
    const b=document.getElementById('ro'+j);if(!b)return;
    b.disabled=true;
    if(o.zh===correct)b.classList.add('correct');
    else if(j===i&&!ok)b.classList.add('wrong');
  });
  speak(correct);
  setTimeout(()=>{
    rIdx++;
    if(rIdx>=rPool.length){
      rDone=true;scores.R=Math.round(rScore/rPool.length*100);saveScores();markDone('R');
      document.getElementById('readBody').innerHTML=resultHTML('📄',scores.R,rScore,rPool.length,'Reading','R','W');
    }else renderRQ();
  },900);
}

// ── WRITING ───────────────────────────────────────────────────
// Show English → type pinyin without tones
let wPool=[],wIdx=0,wScore=0,wDone=false;
function stripTones(s){
  return s.toLowerCase()
    .replace(/[āáǎà]/g,'a').replace(/[ēéěè]/g,'e').replace(/[īíǐì]/g,'i')
    .replace(/[ōóǒò]/g,'o').replace(/[ūúǔù]/g,'u').replace(/[ǖǘǚǜü]/g,'u')
    .replace(/\s+/g,'').trim();
}
function initWrite(){
  if(wDone)return;
  wPool=shuffle([...activeVocab]);wIdx=0;wScore=0;renderWQ();
}
function renderWQ(){
  const p=wPool[wIdx];
  document.getElementById('writeBody').innerHTML=`
    <div class="card">
      <div class="qmeta"><span>Q ${wIdx+1}/${wPool.length}</span><span style="color:var(--teal)">✅ ${wScore}/${wIdx}</span></div>
      <div class="prog-wrap"><div class="prog-fill" style="width:${Math.round(wIdx/wPool.length*100)}%;background:linear-gradient(90deg,var(--purple),var(--blue))"></div></div>
      <div class="lesson-tag">Lesson ${p.l}</div>
      <div style="text-align:center;margin:6px 0 14px">
        <div style="font-size:12px;color:var(--muted);font-weight:700;margin-bottom:8px">Type the pinyin for:</div>
        <div style="font-size:26px;font-weight:900;color:var(--ink)">${p.en}</div>
        <div style="font-size:11px;color:var(--muted);margin-top:6px">No tones needed — e.g. <strong>nihao</strong></div>
      </div>
      <input class="w-input" id="wInp" placeholder="Type pinyin here…" onkeydown="if(event.key==='Enter')checkW()">
      <div class="w-result" id="wRes"></div>
      <button class="btn btn-check" onclick="checkW()">Check ✓</button>
      <button class="btn btn-nxt" id="wNxt" style="display:none;margin-top:8px" onclick="nextW()">Next →</button>
    </div>`;
  document.getElementById('wInp').focus();
}
function checkW(){
  const inp=stripTones(document.getElementById('wInp').value.trim());
  const p=wPool[wIdx];
  const accepted=[stripTones(p.py)];
  const ok=accepted.includes(inp)||accepted.some(a=>a===inp);
  if(ok)wScore++;
  const res=document.getElementById('wRes');
  res.style.display='block';
  res.className='w-result '+(ok?'ok':'err');
  res.innerHTML=ok?`✅ Correct! <strong>${p.py}</strong> <span style="font-family:'Noto Sans SC',sans-serif">(${p.zh})</span>`
    :`❌ Answer: <strong>${p.py}</strong> <span style="font-family:'Noto Sans SC',sans-serif">(${p.zh})</span>`;
  document.getElementById('wInp').disabled=true;
  document.querySelector('.btn-check').disabled=true;
  document.getElementById('wNxt').style.display='block';
  speak(p.zh);
}
function nextW(){
  wIdx++;
  if(wIdx>=wPool.length){
    wDone=true;scores.W=Math.round(wScore/wPool.length*100);saveScores();markDone('W');
    document.getElementById('writeBody').innerHTML=resultHTML('✍️',scores.W,wScore,wPool.length,'Writing','W','SB');
    return;
  }
  renderWQ();
}

// ── RESULT ────────────────────────────────────────────────────
function resultHTML(emoji,pct,correct,total,label,cur,next){
  const col=pct>=80?'var(--teal)':pct>=60?'var(--gold)':pct>=40?'var(--blue)':'var(--muted)';
  const e=pct>=80?'🏆':pct>=60?'🌟':pct>=40?'📚':'🌱';
  const nextLbl={'S':'🎤 Speak','R':'📄 Read','W':'✍️ Write','SB':'🏆 Scores'}[next]||'→';
  return`<div class="card result-card">
    <div class="res-emoji">${emoji}</div>
    <div class="res-pct" style="color:${col}">${e} ${pct}%</div>
    <div class="res-sub">${correct}/${total} correct · ${label}</div>
    <div class="btn-row">
      <button class="btn btn-retry" onclick="reset${cur}()">🔄 Retry</button>
      <button class="btn btn-sb" onclick="showTab('${next}')">→ ${nextLbl}</button>
    </div>
  </div>`;
}
function resetL(){lDone=false;delete scores.L;saveScores();document.getElementById('tL').classList.remove('done');initListen();}
function resetS(){sDoneAll=false;delete scores.S;saveScores();document.getElementById('tS').classList.remove('done');initSpeak();}
function resetR(){rDone=false;delete scores.R;saveScores();document.getElementById('tR').classList.remove('done');initRead();}
function resetW(){wDone=false;delete scores.W;saveScores();document.getElementById('tW').classList.remove('done');initWrite();}

// ── SCOREBOARD ────────────────────────────────────────────────
function renderSB(){
  const secs=[
    {key:'L',label:'🎧 Listening',color:'var(--blue)'},
    {key:'S',label:'🎤 Speaking',color:'var(--red)'},
    {key:'R',label:'📄 Reading',color:'var(--orange)'},
    {key:'W',label:'✍️ Writing',color:'var(--purple)'},
  ];
  const vals=secs.map(s=>scores[s.key]).filter(x=>x!==undefined);
  const overall=vals.length?Math.round(vals.reduce((a,b)=>a+b,0)/vals.length):0;
  const col=overall>=80?'var(--teal)':overall>=60?'var(--gold)':overall>=40?'var(--blue)':'var(--muted)';
  const e=overall>=80?'🏆':overall>=60?'🌟':overall>=40?'📚':'🌱';
  const filterLabel=currentFilter==='all'?'All Lessons':`Lesson ${currentFilter}`;
  document.getElementById('sbBody').innerHTML=`
    <div style="text-align:center;margin-bottom:18px">
      <div style="font-size:13px;color:var(--muted);font-weight:700;margin-bottom:6px">Filter: ${filterLabel} · ${activeVocab.length} words</div>
      <div style="font-size:56px;font-weight:900;color:${col}">${e} ${overall}%</div>
      <div style="font-size:13px;color:var(--muted);font-weight:600">${vals.length}/4 sections completed</div>
    </div>
    ${secs.map(s=>{
      const v=scores[s.key],pct=v||0;
      return`<div class="sb-row">
        <div class="sb-lbl">${s.label}</div>
        <div class="sb-bar-wrap"><div class="sb-bar" style="width:${pct}%;background:${s.color}"></div></div>
        <div class="sb-sc" style="color:${s.color}">${v!==undefined?v+'%':'—'}</div>
      </div>`;
    }).join('')}
    <div style="margin-top:18px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
      <button class="btn btn-retry" style="font-size:12px;padding:9px 16px" onclick="if(confirm('Reset scores?')){scores={};saveScores();renderSB();}">🔄 Reset</button>
      <button class="btn btn-ok" style="font-size:12px;padding:9px 16px" onclick="showTab('L')">▶ Restart Test</button>
    </div>`;
}

// Auto-start
initListen();
</script>
</body>
</html>
