/* ---------------- Speech helpers -------------- */

function pickZhVoice() {
  try {
    const vs = window.speechSynthesis.getVoices() || [];
    return vs.find((v) => v.lang && v.lang.toLowerCase().startsWith("zh")) || null;
  } catch (e) {
    return null;
  }
}

function speak(text, rate = 0.75) {
  try {
    const synth = window.speechSynthesis;
    if (!synth) return;
    synth.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "zh-CN";
    u.rate = rate;
    u.pitch = 1.15;
    const v = pickZhVoice();
    if (v) u.voice = v;
    synth.speak(u);
  } catch (e) {}
}

/* ---------------- Small utilities -------------- */

const shuffle = (arr) => {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
};
const sample = (arr, n) => shuffle(arr).slice(0, n);
const rand = (arr) => arr[Math.floor(Math.random() * arr.length)];

/* 1. Basic Strokes — flashcards */
function StrokesActivity({ onDone }) {
  const [i, setI] = useState(0);
  const [seen, setSeen] = useState(() => new Set());
  const cur = STROKES[i];

  useEffect(() => {
    speak(cur.pinyin);
    setSeen((s) => new Set(s).add(i));
  }, [i]);

  const next = () => {
    if (i < STROKES.length - 1) setI(i + 1);
    else onDone({ stars: 3, perfect: true });
  };

  return (
    <div className="act">
      <p className="act-instr">Meet the 8 basic strokes. Tap to hear each name!</p>
      <div className="flash">
        <div className="flash-glyph" onClick={() => speak(cur.pinyin)}>{cur.char}</div>
        <div className="flash-py">{cur.pinyin}</div>
        <div className="flash-en">{cur.meaning}</div>
        <button className="speakbtn speakbtn-big" onClick={() => speak(cur.pinyin)}>
          <Volume2 size={28} />
        </button>
      </div>
      <div className="dots">
        {STROKES.map((_, k) => (
          <span key={k} className={`dot ${seen.has(k) ? "dot-on" : ""} ${k === i ? "dot-cur" : ""}`} />
        ))}
      </div>
      <button className="bigbtn" onClick={next}>
        {i < STROKES.length - 1 ? "Next stroke" : "I learned them!"} <ArrowRight size={22} />
      </button>
    </div>
  );
}

/* 2. Which Stroke? — recognise an isolated stroke */
function StrokeIdActivity({ onDone }) {
  const [round, setRound] = useState(0);
  const [q, setQ] = useState(() => makeQ());
  const [picked, setPicked] = useState(null);
  const [score, setScore] = useState(0);
  const TOTAL = 5;

  function makeQ() {
    const correct = rand(STROKES);
    const opts = shuffle([correct, ...sample(STROKES.filter((s) => s !== correct), 3)]);
    return { correct, opts };
  }
  useEffect(() => { speak(q.correct.pinyin); }, [q]);

  const choose = (s) => {
    if (picked) return;
    setPicked(s);
    const right = s.char === q.correct.char;
    if (right) setScore((x) => x + 1);
    setTimeout(() => {
      if (round + 1 >= TOTAL) {
        const final = score + (right ? 1 : 0);
        onDone({ stars: final >= 5 ? 3 : final >= 3 ? 2 : 1, perfect: final === TOTAL });
      } else {
        setRound((r) => r + 1);
        setQ(makeQ());
        setPicked(null);
      }
    }, 850);
  };

  return (
    <div className="act">
      <p className="act-instr">Which stroke is this? Round {round + 1} / {TOTAL}</p>
      <div className="bigglyph" onClick={() => speak(q.correct.pinyin)}>{q.correct.char}</div>
      <div className="choices">
        {q.opts.map((s) => {
          const state = picked ? (s.char === q.correct.char ? "ok" : s === picked ? "bad" : "") : "";
          return (
            <button key={s.char} className={`choice ${state}`} onClick={() => choose(s)}>
              <span className="choice-py">{s.pinyin}</span>
              <span className="choice-en">{s.meaning}</span>
              {state === "ok" && <Check className="choice-ic" size={20} />}
              {state === "bad" && <X className="choice-ic" size={20} />}
            </button>
          );
        })}
      </div>
    </div>
  );
}

/* 3. Say It! — pronunciation with optional mic */
function PronActivity({ onDone }) {
  const [i, setI] = useState(0);
  const [phase, setPhase] = useState("listen"); // listen | rate
  const [listening, setListening] = useState(false);
  const [micOk, setMicOk] = useState(true);
  const cur = PRON[i];
  const recRef = useRef(null);

  useEffect(() => {
    speak(cur.hz);
    setPhase("listen");
  }, [i]);

  const tryMic = () => {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { setMicOk(false); setPhase("rate"); return; }
    try {
      const rec = new SR();
      rec.lang = "zh-CN";
      rec.interimResults = false;
      rec.maxAlternatives = 1;
      recRef.current = rec;
      setListening(true);
      rec.onresult = () => { setListening(false); setPhase("rate"); };
      rec.onerror = () => { setListening(false); setMicOk(false); setPhase("rate"); };
      rec.onend = () => { setListening(false); setPhase("rate"); };
      rec.start();
    } catch (e) { setMicOk(false); setPhase("rate"); }
  };

  const finishWord = () => {
    if (i < PRON.length - 1) setI(i + 1);
    else onDone({ stars: 3, perfect: true });
  };

  return (
    <div className="act">
      <p className="act-instr">Listen, then say it out loud! Word {i + 1} / {PRON.length}</p>
      <div className="flash">
        <div className="flash-glyph" onClick={() => speak(cur.hz)}>{cur.hz}</div>
        <div className="flash-py">{cur.py}</div>
        <div className="flash-en">{cur.en}</div>
        <div className={`wave ${listening ? "wave-on" : ""}`}>
          {Array.from({ length: 7 }).map((_, k) => <span key={k} style={{ animationDelay: `${k * 0.08}s` }} />)}
        </div>
      </div>

      {phase === "listen" && (
        <div className="row">
          <button className="bigbtn ghost" onClick={() => speak(cur.hz)}><Volume2 size={20} /> Listen</button>
          <button className="bigbtn" onClick={tryMic}><Mic size={20} /> My turn</button>
        </div>
      )}

      {phase === "rate" && (
        <div className="rate">
          {micOk
            ? <div className="rate-result">🎉 Excellent! <span>+15 XP for great speaking</span></div>
            : <div className="rate-result soft">Great practice! <span>Say it once more with me</span></div>}
          <button className="bigbtn" onClick={finishWord}>
            {i < PRON.length - 1 ? "Next word" : "Finish"} <ArrowRight size={22} />
          </button>
        </div>
      )}
    </div>
  );
}

/* 4. Number Match — memory pairs (character <-> pinyin) */
function NumbersActivity({ onDone }) {
  const pool = sample(NUMBERS, 5);
  const [cards] = useState(() =>
    shuffle(
      pool.flatMap((p) => [
        { id: p.hz + "-h", key: p.n, kind: "hz", label: p.hz, hz: p.hz },
        { id: p.hz + "-p", key: p.n, kind: "py", label: p.py, hz: p.hz },
      ])
    )
  );
  const [open, setOpen] = useState([]);
  const [matched, setMatched] = useState(() => new Set());
  const [tries, setTries] = useState(0);
  const lock = useRef(false);

  const flip = (idx) => {
    if (lock.current) return;
    if (open.includes(idx) || matched.has(cards[idx].id)) return;
    speak(cards[idx].hz);
    const nextOpen = [...open, idx];
    setOpen(nextOpen);
    if (nextOpen.length === 2) {
      setTries((t) => t + 1);
      const [a, b] = nextOpen;
      if (cards[a].key === cards[b].key) {
        const m = new Set(matched); m.add(cards[a].id); m.add(cards[b].id);
        setMatched(m); setOpen([]);
        if (m.size === cards.length) {
          setTimeout(() => onDone({ stars: tries <= 6 ? 3 : tries <= 9 ? 2 : 1, perfect: tries <= 5 }), 500);
        }
      } else {
        lock.current = true;
        setTimeout(() => { setOpen([]); lock.current = false; }, 750);
      }
    }
  };

  return (
    <div className="act">
      <p className="act-instr">Find the pairs — match the character to its sound!</p>
      <div className="memgrid">
        {cards.map((c, idx) => {
          const faceUp = open.includes(idx) || matched.has(c.id);
          return (
            <button
              key={c.id}
              className={`memcard ${faceUp ? "up" : ""} ${matched.has(c.id) ? "done" : ""}`}
              onClick={() => flip(idx)}
            >
              <span className="memcard-inner">
                {faceUp ? <span className={c.kind === "hz" ? "mem-hz" : "mem-py"}>{c.label}</span> : <span className="mem-back">🀄</span>}
              </span>
            </button>
          );
        })}
      </div>
      <p className="act-meta">Tries: {tries}</p>
    </div>
  );
}

/* 6. Trace It — simple tracing canvas (coverage based) */
function OrderActivity({ onDone }) {
  const [i, setI] = useState(0);
  const cur = ORDER_CHARS[i];
  const canvasRef = useRef(null);
  const drawing = useRef(false);
  const last = useRef(null);
  const dist = useRef(0);
  const [progress, setProgress] = useState(0);
  const [done, setDone] = useState(false);
  const NEED = 900;

  const reset = useCallback(() => {
    const c = canvasRef.current; if (!c) return;
    const ctx = c.getContext("2d");
    ctx.clearRect(0, 0, c.width, c.height);
    dist.current = 0; setProgress(0); setDone(false);
  }, []);

  useEffect(() => { reset(); speak(cur.hz); }, [i, reset, cur.hz]);

  const pos = (e) => {
    const c = canvasRef.current;
    const r = c.getBoundingClientRect();
    const t = e.touches ? e.touches[0] : e;
    return { x: (t.clientX - r.left) * (c.width / r.width), y: (t.clientY - r.top) * (c.height / r.height) };
  };
  const start = (e) => { e.preventDefault(); drawing.current = true; last.current = pos(e); };
  const move = (e) => {
    if (!drawing.current) return;
    e.preventDefault();
    const c = canvasRef.current; const ctx = c.getContext("2d");
    const p = pos(e); const l = last.current;
    ctx.strokeStyle = done ? "#2EC4B6" : "#FF5A5F";
    ctx.lineWidth = 16; ctx.lineCap = "round"; ctx.lineJoin = "round";
    ctx.beginPath(); ctx.moveTo(l.x, l.y); ctx.lineTo(p.x, p.y); ctx.stroke();
    dist.current += Math.hypot(p.x - l.x, p.y - l.y);
    last.current = p;
    const pr = Math.min(100, Math.round((dist.current / NEED) * 100));
    setProgress(pr);
    if (pr >= 100 && !done) setDone(true);
  };
  const end = () => { drawing.current = false; };

  const next = () => {
    if (i < ORDER_CHARS.length - 1) setI(i + 1);
    else onDone({ stars: 3, perfect: true });
  };

  return (
    <div className="act">
      <p className="act-instr">Trace over the character with your finger! {i + 1} / {ORDER_CHARS.length}</p>
      <div className={`tracebox ${done ? "trace-done" : ""}`}>
        <span className="trace-guide">{cur.hz}</span>
        <canvas
          ref={canvasRef} width={320} height={320} className="tracecanvas"
          onMouseDown={start} onMouseMove={move} onMouseUp={end} onMouseLeave={end}
          onTouchStart={start} onTouchMove={move} onTouchEnd={end}
        />
        {done && <span className="trace-tick"><Check size={48} /></span>}
      </div>
      <div className="tracebar"><span style={{ width: `${progress}%` }} /></div>
      <div className="trace-meta">
        <span className="trace-py">{cur.py} · {cur.en}</span>
      </div>
      <div className="row">
        <button className="bigbtn ghost" onClick={reset}><Eraser size={18} /> Clear</button>
        <button className="bigbtn ghost" onClick={() => speak(cur.hz)}><Volume2 size={18} /> Hear</button>
        <button className="bigbtn" disabled={!done} onClick={next}>
          {i < ORDER_CHARS.length - 1 ? "Next" : "Done"} <ArrowRight size={20} />
        </button>
      </div>
    </div>
  );
}

/* 11. Speed Match — tap the pinyin for the shown character, beat the clock */
function MiniActivity({ onDone }) {
  const pool = [...NUMBERS, ...GREETINGS.map((g) => ({ hz: g.hz, py: g.py }))];
  const [time, setTime] = useState(20);
  const [score, setScore] = useState(0);
  const [q, setQ] = useState(() => makeQ());
  const [flash, setFlash] = useState("");

  function makeQ() {
    const correct = rand(pool);
    const opts = shuffle([correct, ...sample(pool.filter((p) => p.py !== correct.py), 2)]);
    return { correct, opts };
  }
  useEffect(() => { speak(q.correct.hz); }, [q]);
  useEffect(() => {
    if (time <= 0) {
      onDone({ stars: score >= 10 ? 3 : score >= 6 ? 2 : 1, perfect: score >= 12 });
      return;
    }
    const t = setTimeout(() => setTime((x) => x - 1), 1000);
    return () => clearTimeout(t);
  }, [time]);

  const choose = (p) => {
    if (p.py === q.correct.py) { setScore((s) => s + 1); setFlash("ok"); }
    else { setFlash("bad"); }
    setTimeout(() => { setFlash(""); setQ(makeQ()); }, 180);
  };

  return (
    <div className="act">
      <div className="speed-top">
        <div className="speed-timer">⏱️ {time}s</div>
        <div className="speed-score">⭐ {score}</div>
      </div>
      <div className={`bigglyph flashable ${flash}`} onClick={() => speak(q.correct.hz)}>{q.correct.hz}</div>
      <div className="numrow">
        {q.opts.map((p, k) => (
          <button key={p.py + k} className="speedbtn" onClick={() => choose(p)}>{p.py}</button>
        ))}
      </div>
      <p className="act-meta">Tap the matching sound — go fast!</p>
    </div>
  );
}

/* 12. Quiz — mixed multiple choice */
function buildQuiz(n = 6) {
  const qs = [];
  const makers = [
    () => { const s = rand(STROKES); return { q: `What is the stroke ${s.char} called?`, hz: s.char, correct: s.pinyin, opts: shuffle([s.pinyin, ...sample(STROKES.filter((x) => x !== s), 3).map((x) => x.pinyin)]) }; },
    () => { const num = rand(NUMBERS); return { q: `Which character means "${num.n}"?`, correct: num.hz, opts: shuffle([num.hz, ...sample(NUMBERS.filter((x) => x !== num), 3).map((x) => x.hz)]), hz: null }; },
    () => { const g = rand(GREETINGS); return { q: `Which one means "${g.en}"?`, correct: g.hz, opts: shuffle([g.hz, ...sample(GREETINGS.filter((x) => x !== g), 2).map((x) => x.hz)]), hz: null }; },
    () => { const c = rand(COUNT); return { q: `How many strokes are in ${c.hz}?`, hz: c.hz, correct: String(c.strokes), opts: (() => { const set = new Set([c.strokes]); while (set.size < 4) set.add(1 + Math.floor(Math.random() * 12)); return shuffle([...set]).map(String); })() }; },
  ];
  for (let i = 0; i < n; i++) qs.push(rand(makers)());
  return qs;
}

function QuizActivity({ onDone, count = 6, title = "Quiz Time", timed = false }) {
  const [quiz] = useState(() => buildQuiz(count));
  const [i, setI] = useState(0);
  const [picked, setPicked] = useState(null);
  const [score, setScore] = useState(0);
  const [time, setTime] = useState(timed ? count * 8 : 0);
  const cur = quiz[i];

  useEffect(() => { if (cur && cur.hz) speak(cur.hz); }, [i]);
  useEffect(() => {
    if (!timed) return;
    if (time <= 0) { onDone({ stars: 1, perfect: false, score: Math.round((score / count) * 100) }); return; }
    const t = setTimeout(() => setTime((x) => x - 1), 1000);
    return () => clearTimeout(t);
  }, [time, timed]);

  const choose = (o) => {
    if (picked != null) return;
    setPicked(o);
    const right = o === cur.correct;
    if (right) setScore((s) => s + 1);
    setTimeout(() => {
      if (i + 1 >= quiz.length) {
        const f = score + (right ? 1 : 0);
        const pct = Math.round((f / count) * 100);
        onDone({ stars: pct >= 90 ? 3 : pct >= 60 ? 2 : 1, perfect: f === count, score: pct });
      } else { setI(i + 1); setPicked(null); }
    }, 850);
  };

  return (
    <div className="act">
      <div className="speed-top">
        <p className="act-instr" style={{ margin: 0 }}>{title} · {i + 1} / {quiz.length}</p>
        {timed && <div className="speed-timer">⏱️ {time}s</div>}
      </div>
      <div className="quizq">
        {cur.hz && <div className="quiz-hz" onClick={() => speak(cur.hz)}>{cur.hz}</div>}
        <div className="quiz-text">{cur.q}</div>
      </div>
      <div className="choices">
        {cur.opts.map((o, k) => {
          const state = picked != null ? (o === cur.correct ? "ok" : o === picked ? "bad" : "") : "";
          return (
            <button key={o + k} className={`choice center ${state}`} onClick={() => choose(o)}>
              <span className="choice-big">{o}</span>
              {state === "ok" && <Check className="choice-ic" size={20} />}
              {state === "bad" && <X className="choice-ic" size={20} />}
            </button>
          );
        })}
      </div>
      <p className="act-meta">Score: {score}</p>
    </div>
  );
}

/* ============================================================
   Root App
   ============================================================ */
function App() {
  const [view, setView] = useState("home");
  const [activeAct, setActiveAct] = useState(null);
  const [result, setResult] = useState(null);
  const [name, setName] = useState("");
  const [avatar, setAvatar] = useState({ face: "🐼", hat: "none" });

  const [stats, setStats] = useState({ xp: 0, coins: 0, diamonds: 0, streak: 1, stars: 0 });
  const [completed, setCompleted] = useState(() => new Set());
  const [earnedBadges, setEarnedBadges] = useState(() => new Set());

  // warm up speech voices
  useEffect(() => {
    try {
      window.speechSynthesis.getVoices();
      window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
    } catch (e) {}
  }, []);

  const level = LEVELS.reduce((acc, l, idx) => (stats.xp >= l.xp ? idx : acc), 0);
  const unlockedIdx = (() => {
    let idx = 0;
    for (let k = 0; k < ACTIVITIES.length; k++) {
      if (completed.has(ACTIVITIES[k].key)) idx = k + 1;
    }
    return Math.min(idx, ACTIVITIES.length - 1);
  })();
  const progressPct = Math.round((completed.size / ACTIVITIES.length) * 100);

  const go = (v) => { window.speechSynthesis && window.speechSynthesis.cancel(); setView(v); };

  const openAct = (key) => { setActiveAct(key); setView("activity"); };

  const finishAct = (key, data) => {
    const xp = 40 + data.stars * 20 + (data.perfect ? 30 : 0) + (key === "boss" ? 100 : 0);
    const coins = 10 + data.stars * 5;
    const diamonds = data.perfect ? 1 : 0;
    setStats((s) => ({
      ...s,
      xp: s.xp + xp,
      coins: s.coins + coins,
      diamonds: s.diamonds + diamonds,
      stars: s.stars + data.stars,
    }));
    setCompleted((c) => new Set(c).add(key));
    setEarnedBadges((b) => {
      const nb = new Set(b);
      if (BADGES.some((x) => x.key === key)) nb.add(key);
      return nb;
    });
    setResult({ ...data, xp, coins, key });
  };

  const closeResult = () => {
    const key = result.key;
    setResult(null);
    setActiveAct(null);
    setView("map");
  };

  const renderActivity = () => {
    const onDone = (data) => finishAct(activeAct, data);
    switch (activeAct) {
      case "strokes": return <StrokesActivity onDone={onDone} />;
      case "strokeId": return <StrokeIdActivity onDone={onDone} />;
      case "pron": return <PronActivity onDone={onDone} />;
      case "numbers": return <NumbersActivity onDone={onDone} />;
      case "rules": return <RulesActivity onDone={onDone} />;
      case "order": return <OrderActivity onDone={onDone} />;
      case "hands": return <HandsActivity onDone={onDone} />;
      case "greet": return <GreetActivity onDone={onDone} />;
      case "count": return <CountActivity onDone={onDone} />;
      case "dialogue": return <DialogueActivity onDone={onDone} />;
      case "mini": return <MiniActivity onDone={onDone} />;
      case "quiz": return <QuizActivity onDone={onDone} />;
      case "boss": return <BossActivity onDone={onDone} playerName={name} />;
      default: return null;
    }
  };

  const actMeta = ACTIVITIES.find((a) => a.key === activeAct);

  return (
    <div className="app">
      <style>{CSS}</style>

      {view !== "home" && <TopBar stats={stats} level={level} />}

      {view === "home" && (
        <HomeScreen go={go} stats={stats} level={level} name={name} setName={setName} progressPct={progressPct} />
      )}
      {view === "map" && (
        <MapScreen go={go} openAct={openAct} completed={completed} unlockedIdx={unlockedIdx} />
      )}
      {view === "rewards" && <RewardsScreen go={go} earnedBadges={earnedBadges} stats={stats} />}
      {view === "avatar" && <AvatarScreen go={go} avatar={avatar} setAvatar={setAvatar} />}
      {view === "board" && <BoardScreen go={go} name={name} stats={stats} />}
      {view === "parent" && <ParentScreen go={go} stats={stats} completed={completed} name={name} />}

      {view === "activity" && (
        <div className="screen actscreen">
          <div className="act-head" style={{ background: actMeta?.color }}>
            <button className="back light" onClick={() => go("map")}><ChevronLeft size={22} /></button>
            <h2>{actMeta?.emoji} {actMeta?.title}</h2>
            <div style={{ width: 40 }} />
          </div>
          {renderActivity()}
        </div>
      )}

      {result && <ResultOverlay data={result} onNext={closeResult} />}
    </div>
  );
}

.tracebar { width:320px; height:12px; background:#F0E7DA; border-radius:8px; overflow:hidden; }
.tracebar span { display:block; height:100%; background:linear-gradient(90deg,#FFC93C,#FF7A45); transition:width .1s; }
.trace-meta .trace-py { font-weight:700; color:#7a6cb8; }
.row .bigbtn[disabled] { width:auto; }

/* Hands / numbers */
.dotsbox { display:flex; flex-wrap:wrap; gap:10px; justify-content:center; max-width:260px;
  background:#fff; padding:18px; border-radius:24px; box-shadow:0 8px 0 #ecdfce; min-height:90px; align-items:center; }
.bigdot { width:30px; height:30px; border-radius:50%; background:#FF7A45; box-shadow:0 3px 0 #d8550e; animation: pop .3s ease; }
.numgrid { display:grid; grid-template-columns:repeat(5,1fr); gap:8px; width:100%; }
.numbtn { font-family:inherit; border:none; background:#fff; border-radius:16px; padding:10px 4px; cursor:pointer;
  box-shadow:0 4px 0 #e7ddcf; display:flex; flex-direction:column; align-items:center; gap:2px; }
.numbtn:active { transform:translateY(2px); box-shadow:0 2px 0 #e7ddcf; }
.numbtn-hz { font-size:26px; font-weight:800; }
.numbtn-py { font-size:12px; color:#8a8492; font-weight:700; }
.numbtn.ok { background:#D9F7E8; box-shadow:0 4px 0 #9fe0c4; }
.numbtn.bad { background:#FFE0E3; box-shadow:0 4px 0 #f3b6bc; }

.numrow { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; }
.countbtn, .speedbtn { font-family:inherit; border:none; background:#fff; border-radius:18px;
  font-size:26px; font-weight:800; width:66px; height:66px; cursor:pointer; box-shadow:0 5px 0 #e7ddcf; color:#3a3640; }
.countbtn:active, .speedbtn:active { transform:translateY(3px); box-shadow:0 2px 0 #e7ddcf; }
.countbtn.ok { background:#D9F7E8; box-shadow:0 5px 0 #9fe0c4; }
.countbtn.bad { background:#FFE0E3; box-shadow:0 5px 0 #f3b6bc; }
.speedbtn { font-size:20px; min-width:90px; width:auto; padding:0 14px; }

/* Scenes / greetings */
.scene { background:#fff; border-radius:26px; padding:18px; box-shadow:0 8px 0 #ecdfce; text-align:center; width:100%; }
.scene-img { font-size:60px; }
.scene-text { font-weight:700; font-size:17px; color:#4b4651; margin-top:6px; }

/* Dialogue */
.npc { display:flex; align-items:flex-start; gap:10px; width:100%; }
.npc-face { font-size:54px; flex-shrink:0; animation: bob 2.6s ease-in-out infinite; }
.bubble { background:#fff; border-radius:8px 22px 22px 22px; padding:12px 16px; box-shadow:0 5px 0 #ecdfce; }
.bubble-joy { background:#FFF6D6; box-shadow:0 5px 0 #f0e2a6; }
.bubble-hz { font-size:24px; font-weight:800; border:none; background:none; cursor:pointer; padding:0; text-align:left; }
.bubble-py { font-size:15px; color:#FF5A6E; font-weight:700; }
.bubble-en { font-size:14px; color:#8a8492; font-weight:600; }
.dialog-end { width:100%; display:flex; flex-direction:column; gap:12px; align-items:center; }
.your-line { font-weight:700; color:#4b4651; }
.your-line b { color:#FF5A6E; }

/* Speed game */
.speed-top { display:flex; justify-content:space-between; width:100%; align-items:center; }
.speed-timer { background:#FF5A6E; color:#fff; font-weight:800; padding:6px 14px; border-radius:16px; }
.speed-score { background:#FFC93C; color:#7a4d00; font-weight:800; padding:6px 14px; border-radius:16px; }

/* Quiz */
.quizq { background:#fff; border-radius:24px; padding:16px 18px; box-shadow:0 8px 0 #ecdfce;
  text-align:center; width:100%; }
.quiz-hz { font-size:90px; line-height:1; cursor:pointer; }
.quiz-text { font-size:18px; font-weight:700; color:#4b4651; margin-top:6px; }

/* Boss + cert */
.boss-intro { text-align:center; gap:10px; padding-top:24px; }
.boss-dragon { font-size:110px; animation: float 2.4s ease-in-out infinite; }
.boss-title { font-size:28px; color:#E8455E; margin:0; }
.boss-sub { color:#6b6470; font-weight:600; max-width:300px; }
.boss-btn { background:linear-gradient(180deg,#FFB347,#FF7A45); box-shadow:0 6px 0 #d8550e; color:#fff; }
.boss-btn:active { box-shadow:0 2px 0 #d8550e; }
.boss-banner { background:#FF5A6E; color:#fff; font-weight:800; padding:8px 16px; border-radius:18px;
  display:flex; gap:8px; align-items:center; }
.boss-banner span { font-size:22px; }
.cert { background:linear-gradient(180deg,#FFFDF5,#FFF3D6); border:4px solid #FFC93C; border-radius:24px;
  padding:22px 20px; text-align:center; width:100%; box-shadow:0 8px 0 #ecdfce; }
.cert-seal { font-size:60px; }
.cert-top { font-size:14px; letter-spacing:2px; text-transform:uppercase; color:#b58a00; font-weight:800; }
.cert-name { font-size:30px; font-weight:800; color:#E8455E; margin:6px 0; }
.cert-line { color:#8a8492; font-weight:600; }
.cert-lesson { font-weight:700; color:#4b4651; margin:2px 0 6px; }
.cert-score { font-size:46px; font-weight:800; color:#2EC4B6; }
.cert-stars { font-size:28px; }
.cert-foot { margin-top:6px; font-weight:700; color:#b58a00; }

/* Result overlay */
.overlay { position:fixed; inset:0; z-index:60; display:flex; align-items:center; justify-content:center;
  background:rgba(45,42,50,.45); padding:20px; }
.result-card { background:#fff; border-radius:30px; padding:26px 24px; text-align:center; width:100%;
  max-width:360px; box-shadow:0 14px 40px rgba(0,0,0,.25); display:flex; flex-direction:column;
  align-items:center; gap:12px; }
.pop-in { animation: pop .4s cubic-bezier(.2,1.4,.5,1); }
@keyframes pop { from{transform:scale(.6); opacity:0;} to{transform:scale(1); opacity:1;} }
.result-title { font-size:30px; color:#E8455E; margin:0; }
.result-stars { display:flex; gap:6px; }
.star-on { animation: pop .4s ease; }
.star-off { color:#E4DACB; }
.reward-row { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; }
.reward-chip { display:flex; align-items:center; gap:5px; background:#FFF3D6; color:#a37200; font-weight:800;
  padding:7px 13px; border-radius:16px; font-size:15px; }

/* Mascot */
.mascot { position:relative; display:flex; align-items:center; justify-content:center; }
.mascot-spark { position:absolute; top:-4px; right:-4px; font-size:26px; animation: pop .5s ease; }

/* Rewards screen */
.reward-banner { display:flex; justify-content:center; gap:18px; margin:6px 0 14px; }
.reward-banner span { display:flex; align-items:center; gap:6px; font-weight:800; background:#fff;
  padding:8px 16px; border-radius:18px; box-shadow:0 4px 0 #ecdfce; }
.sec-h { font-size:18px; color:#5b5563; margin:16px 4px 8px; }
.badgegrid, .petgrid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
.badge, .pet { background:#fff; border-radius:18px; padding:12px 6px; text-align:center; box-shadow:0 4px 0 #ecdfce; }
.badge.locked { opacity:.55; }
.badge-emoji { font-size:34px; }
.badge-name { font-size:12px; font-weight:700; color:#5b5563; margin-top:4px; }
.pet-e { font-size:36px; }
.pet-n { font-weight:800; }
.pet-c { font-size:12px; color:#8a8492; font-weight:700; }
.pet-locked { opacity:.6; }

/* Avatar */
.avatar-preview { display:flex; justify-content:center; margin:8px 0; }
.avatar-face { position:relative; width:140px; height:140px; background:#fff; border-radius:50%;
  display:flex; align-items:center; justify-content:center; box-shadow:0 8px 0 #ecdfce; }
.avatar-base { font-size:90px; }
.avatar-hat { position:absolute; top:-6px; font-size:48px; }
.pickgrid { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
.pick { font-size:38px; border:none; background:#fff; border-radius:18px; padding:8px 0; cursor:pointer;
  box-shadow:0 4px 0 #ecdfce; }
.pick.sel { background:#FFF3D6; box-shadow:0 4px 0 #f0d98a; outline:3px solid #FFC93C; }

/* Leaderboard */
.board { display:flex; flex-direction:column; gap:8px; }
.board-row { display:flex; align-items:center; gap:12px; background:#fff; border-radius:16px; padding:12px 14px;
  box-shadow:0 4px 0 #ecdfce; font-weight:700; }
.board-row.me { background:#FFF3D6; box-shadow:0 4px 0 #f0d98a; }
.board-rank { font-size:18px; font-weight:800; color:#FF7A45; width:22px; }
.board-e { font-size:28px; }
.board-n { flex:1; }
.board-xp { display:flex; align-items:center; gap:4px; color:#9B5DE5; }

/* Parent */
.pgrid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.pstat { background:#fff; border-radius:18px; padding:16px; text-align:center; box-shadow:0 4px 0 #ecdfce; }
.pstat-n { font-size:30px; font-weight:800; color:#2EC4B6; }
.pstat-l { font-size:13px; color:#8a8492; font-weight:700; }
.plist { list-style:none; padding:0; margin:4px; display:flex; flex-direction:column; gap:8px; }
.plist li { background:#fff; border-radius:14px; padding:11px 14px; font-weight:600; box-shadow:0 3px 0 #ecdfce; }
.pnote { background:#FFF3D6; border-radius:16px; padding:14px; margin-top:12px; font-size:14px; color:#6b5b2a; }

/* Confetti */
.confetti-wrap { position:fixed; inset:0; pointer-events:none; overflow:hidden; z-index:55; }
.confetti-piece { position:absolute; top:-12px; width:11px; height:14px; border-radius:2px;
  animation: confetti-fall linear forwards; }
@keyframes confetti-fall { to { transform:translateY(110vh) rotate(540deg); opacity:.9; } }

@media (prefers-reduced-motion: reduce) {
  * { animation-duration:.001s !important; animation-iteration-count:1 !important; }
}
`;

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
