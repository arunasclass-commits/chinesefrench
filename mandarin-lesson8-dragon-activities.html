<style>
:root{
  --bg1:#fff6ea; --bg2:#ffd9c2;
  --pink:#ff8fab; --pink2:#e0416f; --green:#4cc38a; --green2:#2fa46b;
  --blue:#4f8ff7; --card:#ffffff; --ink:#33291f; --muted:#9a8b82;
  --gold:#f0a500; --dragon:#e04f2f;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;font-family:'Baloo 2','Noto Sans SC',system-ui,sans-serif;color:var(--ink);
  background:linear-gradient(160deg,var(--bg1),var(--bg2));min-height:100vh}
.wrap{max-width:820px;margin:0 auto;padding:16px 14px 40px}
header{text-align:center;margin-bottom:10px}
.titlerow{display:flex;align-items:center;justify-content:center;gap:12px}
h1{font-size:25px;margin:0;color:var(--dragon)}
.sub{color:var(--muted);font-weight:600;font-size:14px}
.dragon{display:inline-block}
.dragon.big{font-size:52px}
.dragon.idle{font-size:34px;animation:bob 2.2s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-6px) rotate(3deg)}}

.scorebar{margin-top:12px}
.score{font-size:22px;font-weight:800;color:var(--gold);transition:transform .2s}
.score .of{color:var(--muted);font-size:15px}
.score.flash{transform:scale(1.25)}
.pop{display:inline-block;animation:pop .5s}
@keyframes pop{0%{transform:scale(.6)}50%{transform:scale(1.4)}100%{transform:scale(1)}}
.bar{height:16px;background:#ffffffaa;border-radius:20px;overflow:hidden;margin:8px auto 0;max-width:520px;box-shadow:inset 0 2px 4px #0001}
.fill{height:100%;background:linear-gradient(90deg,#ffb703,var(--dragon));border-radius:20px;transition:width .5s}
.win{margin-top:8px;font-weight:800;color:var(--green2)}

.tabs{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:14px 0}
.tab{border:none;background:#fff;color:var(--ink);font-family:inherit;font-weight:700;
  padding:9px 13px;border-radius:16px;font-size:13px;cursor:pointer;box-shadow:0 2px 6px #0001}
.tab.active{background:var(--dragon);color:#fff;box-shadow:0 4px 10px #e04f2f55}
.tab.finished{background:var(--green);color:#fff}
.tab.finished.active{background:var(--green2)}

.section{background:#fff9;border-radius:22px;padding:16px;box-shadow:0 6px 18px #0000000d}
.section h2{margin:2px 0 10px;color:var(--dragon);font-size:20px}
.sicon{font-size:22px}
.note{color:var(--muted);font-weight:600;font-size:13px;margin:10px 0 6px}
.secprogress{font-weight:800;color:var(--blue);font-size:13px;margin-bottom:14px}

/* dragon greeting bubble */
.greet{display:flex;align-items:center;gap:10px;background:#fff;border-radius:18px;padding:12px 14px;
  box-shadow:0 3px 10px #0000000f}
.bubble{position:relative;background:#fff3e6;border-radius:14px;padding:10px 14px;font-weight:700;
  color:var(--ink);font-size:14px;flex:1}
.bubble:before{content:"";position:absolute;left:-8px;top:16px;border:8px solid transparent;
  border-right-color:#fff3e6;border-left:0}

/* dragon fly-across celebration */
.flyzone{margin:14px 0}
.flypath{position:relative;height:64px;overflow:hidden}
.dragon.flying{position:absolute;top:8px;left:-70px;font-size:46px;animation:fly 2.6s ease-in-out infinite}
@keyframes fly{
  0%{left:-70px;transform:translateY(0) scaleX(1)}
  50%{transform:translateY(-14px) scaleX(1)}
  100%{left:100%;transform:translateY(0) scaleX(1)}
}
.flybanner{text-align:center;background:#fff;border-radius:18px;padding:14px;box-shadow:0 4px 14px #0000000f}
.flytitle{font-weight:800;color:var(--green2);font-size:18px}
.flysub{color:var(--muted);font-weight:600;font-size:13px;margin-top:4px}
.flybanner .bigbtn{max-width:280px;margin:12px auto 0}

/* flip cards */
.flipwrap{max-width:340px;margin:0 auto}
.flipcard{perspective:1000px;cursor:pointer;height:260px}
.flipinner{position:relative;width:100%;height:100%;transition:transform .5s;transform-style:preserve-3d}
.flipcard.flipped .flipinner{transform:rotateY(180deg)}
.flipface{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;
  background:#fff;border-radius:24px;box-shadow:0 6px 18px #0000001a;
  display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px}
.flipface.back{transform:rotateY(180deg);background:linear-gradient(160deg,#fff,#fff1e8)}
.cue{font-size:30px;line-height:1.2}
.cue.big{font-size:78px}
.fhz2{font-size:36px;font-weight:700;margin-top:6px;text-align:center;line-height:1.3}
.fpy2{font-size:20px;font-weight:800;color:var(--pink2);margin-top:4px}
.fen2{font-size:15px;font-weight:600;color:var(--muted);margin-top:4px;text-align:center}
.tap{margin-top:12px;font-size:12px;font-weight:700;color:var(--muted);text-align:center}
.fliprow{display:flex;gap:10px;justify-content:center;margin-top:16px}

/* quiz */
.qcount{color:var(--muted);font-weight:700;font-size:13px;margin-bottom:8px}
.qbox{text-align:center}
.qprompt{margin:6px 0 14px}
.qbig{font-size:52px;font-weight:700;display:inline-block;line-height:1.25}
.qbig.cueprompt{font-size:78px}
.qsub{color:var(--pink2);font-weight:800;font-size:18px;margin-top:2px}
.qhint{color:var(--blue);font-weight:700;font-size:12px;margin-top:6px}
.qlead{margin-top:10px;font-weight:700;color:var(--muted);font-size:13px}
.playbtn{display:block;margin:0 auto 10px;border:none;font-family:inherit;font-weight:800;cursor:pointer;
  background:var(--blue);color:#fff;padding:10px 18px;border-radius:16px;font-size:14px}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:10px;max-width:480px;margin:0 auto}
.opt{border:none;font-family:inherit;font-weight:800;font-size:16px;padding:14px 10px;border-radius:16px;
  cursor:pointer;background:#fff;color:var(--ink);box-shadow:0 3px 8px #0000000f}
.opt:active{transform:scale(.97)}
.opt.right{background:var(--green);color:#fff;animation:pop .4s}
.opt.wrong{background:#ffb3c1;color:#fff}
.ohz{display:block;font-size:22px;font-weight:700;line-height:1.25}
.opy{display:block;font-size:12px;font-weight:800;color:var(--pink2)}
.opt.right .opy,.opt.wrong .opy{color:#fff}
.qnav{margin-top:16px;text-align:center;display:flex;gap:10px;justify-content:center}
.alldone{font-weight:800;color:var(--green2);align-self:center}

/* say it */
.saycard{display:block;width:100%;border:none;font-family:inherit;cursor:pointer;background:#fff;
  border-radius:22px;padding:18px 14px;box-shadow:0 4px 14px #0000000f;text-align:center}
.saycard:active{transform:scale(.99)}
.qhz{display:block;font-size:28px;font-weight:700;line-height:1.35}
.qpy{display:block;color:var(--pink2);font-weight:800;font-size:16px;margin-top:4px}
.qen{display:block;color:var(--muted);font-weight:600;font-size:14px;margin-top:2px}
.listen{display:inline-block;margin-top:10px;background:var(--blue);color:#fff;font-weight:800;
  padding:8px 16px;border-radius:14px;font-size:14px}
.lockmsg{margin-top:14px;font-weight:800;color:var(--gold);background:#fff6e0;padding:12px;border-radius:14px;text-align:center}
.answerbox{margin-top:16px;background:#fff8;border-radius:20px;padding:14px;text-align:center}
.asklabel{font-weight:800;color:var(--blue);margin-bottom:10px;font-size:15px}
.stars{font-size:24px;margin-top:10px}
.bigbtn{display:block;width:100%;border:none;font-family:inherit;font-weight:800;font-size:17px;
  padding:15px;border-radius:18px;background:var(--green);color:#fff;cursor:pointer;margin-top:12px}
.bigbtn.done{background:var(--green2)}
.mini{border:none;font-family:inherit;font-weight:800;padding:9px 14px;border-radius:14px;cursor:pointer;
  font-size:13px;background:#ffe3ee;color:var(--pink2)}
.mini.go{background:var(--green);color:#fff}
.mini.go.done{background:var(--green2)}

/* mic */
.mic{margin-top:6px}
.micbtn{border:none;font-family:inherit;font-weight:800;cursor:pointer;background:var(--blue);color:#fff;
  padding:10px 18px;border-radius:16px;font-size:14px}
.micbtn:disabled{opacity:.7}
.michear{margin-top:8px;font-weight:700;color:var(--muted);font-size:13px}
.michear.good{color:var(--green2)}

.pager{display:flex;justify-content:space-between;margin-top:16px}
.pager .mini.go{margin-left:auto}
footer{text-align:center;color:var(--muted);font-weight:600;font-size:12px;margin-top:26px}

@media (max-width:420px){
  .opts{grid-template-columns:1fr}
  .qbig{font-size:42px}
}
