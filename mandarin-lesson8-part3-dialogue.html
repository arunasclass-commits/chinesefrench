<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Lesson 8 Part 3 · Text 2 Dialogue 🐼</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Noto+Sans+SC:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg1:#fff4e6; --bg2:#ffe0c2; --panda:#2b2b2b;
  --pink:#ff8fab; --pink2:#ff6b9d; --green:#4cc38a; --green2:#2fa46b;
  --blue:#5aa9e6; --card:#ffffff; --ink:#3a2f2a; --muted:#9a8b82;
  --gold:#ffb703;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
  margin:0;font-family:'Baloo 2','Noto Sans SC',system-ui,sans-serif;
  color:var(--ink);
  background:linear-gradient(160deg,var(--bg1),var(--bg2));
  min-height:100vh;
}
.wrap{max-width:820px;margin:0 auto;padding:16px 14px 40px}
header{text-align:center;margin-bottom:10px}
.titlerow{display:flex;align-items:center;justify-content:center;gap:12px}
h1{font-size:26px;margin:0;color:var(--pink2)}
.sub{color:var(--muted);font-weight:600;font-size:14px}
.scorebar{margin-top:12px}
.score{font-size:22px;font-weight:800;color:var(--gold);transition:transform .2s}
.score .of{color:var(--muted);font-size:15px}
.score.flash{transform:scale(1.25)}
.pop{display:inline-block;animation:pop .5s}
@keyframes pop{0%{transform:scale(.6)}50%{transform:scale(1.4)}100%{transform:scale(1)}}
.bar{height:16px;background:#ffffffaa;border-radius:20px;overflow:hidden;margin:8px auto 0;max-width:520px;box-shadow:inset 0 2px 4px #0001}
.fill{height:100%;background:linear-gradient(90deg,var(--green),var(--green2));border-radius:20px;transition:width .5s}
.win{margin-top:8px;font-weight:800;color:var(--green2)}

.tabs{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:14px 0}
.tab{border:none;background:#fff;color:var(--ink);font-family:inherit;font-weight:700;
  padding:8px 12px;border-radius:16px;font-size:13px;cursor:pointer;box-shadow:0 2px 6px #0001}
.tab.active{background:var(--pink);color:#fff;box-shadow:0 4px 10px #ff8fab66}

.section{background:#fff8;border-radius:22px;padding:16px;box-shadow:0 6px 18px #0000000d}
.section h2{margin:2px 0 4px;color:var(--pink2);font-size:20px}
.sicon{font-size:22px}
.note{color:var(--muted);font-weight:600;font-size:13px;margin:0 0 12px}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
.card{position:relative;border:none;background:var(--card);border-radius:18px;padding:14px 10px;
  cursor:pointer;text-align:center;box-shadow:0 3px 10px #0000000f;font-family:inherit;
  transition:transform .12s}
.card:active{transform:scale(.95)}
.card.got{outline:3px solid var(--green);}
.card .hz{font-size:34px;font-weight:700;color:var(--ink)}
.card .py{color:var(--pink2);font-weight:800;font-size:15px;margin-top:2px}
.card .en{color:var(--muted);font-weight:600;font-size:13px}
.card .ear{font-size:14px;margin-top:4px;opacity:.6}
.tick{position:absolute;top:6px;right:8px;color:var(--green2);font-weight:900}

.card.read{cursor:default}
.card.read .hz{cursor:pointer}
.readrow{display:flex;gap:8px;justify-content:center;margin-top:10px}
.mini{border:none;font-family:inherit;font-weight:800;padding:8px 12px;border-radius:14px;
  cursor:pointer;font-size:13px;background:#ffe3ee;color:var(--pink2)}
.mini.go{background:var(--green);color:#fff}
.mini.go.done,.mini.go.done:hover{background:var(--green2)}
.mini.done{background:var(--green2);color:#fff}

.quiz{}
.qcount{color:var(--muted);font-weight:700;font-size:13px;margin-bottom:8px}
.qbox{text-align:center}
.qprompt{margin:6px 0 14px}
.qbig{font-size:64px;font-weight:700;display:inline-block}
.qsub{color:var(--muted);font-weight:700}
.qhint{color:var(--pink2);font-weight:700;font-size:12px;margin-top:4px}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:10px;max-width:460px;margin:0 auto}
.opt{border:none;font-family:inherit;font-weight:800;font-size:16px;padding:14px;border-radius:16px;
  cursor:pointer;background:#fff;color:var(--ink);box-shadow:0 3px 8px #0000000f}
.opt:active{transform:scale(.97)}
.opt.right{background:var(--green);color:#fff;animation:pop .4s}
.opt.wrong{background:#ffb3c1;color:#fff}
.qnav{margin-top:16px;text-align:center}
.alldone{font-weight:800;color:var(--green2)}

.speak .lines{display:flex;flex-direction:column;gap:10px}
.line{background:#fff;border-radius:16px;padding:12px 14px;cursor:pointer;position:relative;
  box-shadow:0 3px 8px #0000000d}
.line:active{transform:scale(.99)}
.line .hz{font-size:24px;font-weight:700}
.line .py{color:var(--pink2);font-weight:700}
.line .en{color:var(--muted);font-weight:600;font-size:13px}
.line .ear{position:absolute;top:10px;right:12px;opacity:.5}
.yourturn{margin:14px 0;font-weight:800;color:var(--blue);background:#eaf4ff;padding:12px;border-radius:14px}
.bigbtn{display:block;width:100%;border:none;font-family:inherit;font-weight:800;font-size:18px;
  padding:16px;border-radius:18px;background:var(--green);color:#fff;cursor:pointer;margin-top:14px}
.bigbtn.done{background:var(--green2)}

.pager{display:flex;justify-content:space-between;margin-top:16px}
.pager .mini.go{margin-left:auto}
footer{text-align:center;color:var(--muted);font-weight:600;font-size:12px;margin-top:26px}

/* ---- listen & repeat ---- */
.repnote{font-weight:800;color:var(--blue);margin-bottom:12px;text-align:center;font-size:15px}
.chunks{display:flex;flex-direction:column;gap:10px;align-items:center}
.chunkrow{display:flex;flex-direction:column;align-items:center;gap:8px;width:100%}
.chunk{display:flex;align-items:center;gap:12px;border:none;font-family:inherit;cursor:pointer;
  background:#fff;border-radius:18px;padding:12px 18px;box-shadow:0 3px 10px #0000000f;
  min-width:220px;justify-content:center}
.chunk:active{transform:scale(.97)}
.cnum{background:var(--pink);color:#fff;font-weight:900;width:28px;height:28px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:15px;flex:none}
.cbody{display:flex;flex-direction:column;text-align:center}
.chz{font-size:30px;font-weight:700}
.cpy{color:var(--pink2);font-weight:800;font-size:15px}
.cear{opacity:.5}
.fullbox{margin-top:20px;text-align:center;background:#fff8;border-radius:18px;padding:14px}
.flabel{font-weight:800;color:var(--green2);margin-bottom:10px}
.fullbtn{display:block;width:100%;border:none;font-family:inherit;cursor:pointer;
  background:linear-gradient(160deg,#fff,#fff2f7);border-radius:18px;padding:16px 12px;
  box-shadow:0 3px 10px #0000000f}
.fullbtn:active{transform:scale(.99)}
.fhz{display:block;font-size:30px;font-weight:700;line-height:1.3}
.fpy{display:block;color:var(--pink2);font-weight:800;font-size:17px}
.fen{display:block;color:var(--muted);font-weight:600;font-size:14px;margin-top:2px}
.listen{display:inline-block;margin-top:10px;background:var(--blue);color:#fff;font-weight:800;
  padding:8px 16px;border-radius:14px;font-size:15px}
.lockmsg{margin-top:14px;font-weight:800;color:var(--gold);background:#fff6e0;padding:12px;border-radius:14px}
.repeatwrap .bigbtn{max-width:340px;margin:14px auto 0}

/* ---- picture cues ---- */
.cue{font-size:30px;line-height:1.2;margin-bottom:2px}
.cue.big{font-size:64px}
.qbig.cueprompt{font-size:78px}
.ohz{display:block;font-size:22px;font-weight:700;line-height:1.2}
.opy{display:block;font-size:13px;font-weight:800;color:var(--pink2)}
.opt.right .opy,.opt.wrong .opy{color:#fff}

/* ---- flip flashcards ---- */
.flipwrap{max-width:340px;margin:0 auto}
.flipcard{perspective:1000px;cursor:pointer;height:260px}
.flipinner{position:relative;width:100%;height:100%;transition:transform .5s;transform-style:preserve-3d}
.flipcard.flipped .flipinner{transform:rotateY(180deg)}
.flipface{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;
  background:#fff;border-radius:24px;box-shadow:0 6px 18px #0000001a;
  display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px}
.flipface.back{transform:rotateY(180deg);background:linear-gradient(160deg,#fff,#fff2f7)}
.fhz2{font-size:40px;font-weight:700;margin-top:4px}
.fpy2{font-size:22px;font-weight:800;color:var(--pink2);margin-top:4px}
.fen2{font-size:16px;font-weight:600;color:var(--muted);margin-top:4px;text-align:center}
.tap{margin-top:12px;font-size:12px;font-weight:700;color:var(--muted)}
.fliprow{display:flex;gap:10px;justify-content:center;margin-top:16px}

</style>
</head>
