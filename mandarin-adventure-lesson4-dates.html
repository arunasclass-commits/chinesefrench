@import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Noto+Sans+SC:wght@500;700;900&display=swap');
* { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
.app { font-family:'Baloo 2','Trebuchet MS',system-ui,sans-serif; color:#2D2A32; max-width:480px; margin:0 auto;
  min-height:100vh; position:relative; background:radial-gradient(120% 90% at 50% -10%, #FFE9C9 0%, #FFD9E0 45%, #D9F2FF 100%); overflow-x:hidden; }
.word-hz,.flash-glyph,.bigglyph,.mcq-hz,.tile-hz,.mem-hz,.choice-hz,.bubble-hz,.built-hz,.bd-hz,.rad-big,.rad-part,.stepper-val,.cert-lesson,.ask-line,.ask-date b,.story b
{ font-family:'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif; }

.topbar { position:sticky; top:0; z-index:20; display:flex; align-items:center; gap:6px; padding:10px 12px;
  background:rgba(255,255,255,.78); backdrop-filter:blur(8px); border-bottom:3px solid #FFE0B2; }
.lvl-badge { display:flex; align-items:center; gap:3px; font-size:18px; font-weight:800; background:#FFC93C; color:#7a4d00; padding:3px 10px; border-radius:20px; }
.lvl-badge span { font-size:13px; }
.stat { display:flex; align-items:center; gap:4px; font-weight:700; font-size:14px; background:#fff; padding:5px 9px; border-radius:16px; box-shadow:0 2px 0 #e7ddcf; }
.stat svg { color:#FF7A45; }

.screen { padding:16px; padding-bottom:40px; animation:fade .3s ease; }
@keyframes fade { from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:none;} }

.home { text-align:center; padding-top:22px; }
.home-title { font-size:29px; font-weight:800; margin:6px 0 2px; color:#E8455E; text-shadow:0 2px 0 #fff; line-height:1.05; }
.home-sub { color:#6b6470; font-weight:600; margin:0 0 12px; }
.floaty { display:inline-block; animation:float 3s ease-in-out infinite; }
@keyframes float { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-12px);} }
.name-row { display:flex; align-items:center; justify-content:center; gap:8px; margin:8px 0; }
.name-row label { font-weight:700; color:#6b6470; }
.name-input { font-family:inherit; font-size:18px; font-weight:700; padding:8px 14px; border:3px solid #FFC93C; border-radius:18px; outline:none; width:160px; text-align:center; background:#fff; }
.progress-card { background:#fff; border-radius:20px; padding:12px 16px; margin:12px 4px; box-shadow:0 4px 0 #ecdfce; }
.progress-top { display:flex; justify-content:space-between; font-weight:700; font-size:14px; margin-bottom:8px; }
.pbar { height:14px; background:#F0E7DA; border-radius:10px; overflow:hidden; }
.pbar span { display:block; height:100%; background:linear-gradient(90deg,#2EC4B6,#56CCF2); transition:width .4s; }
.home-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-top:14px; }
.home-tile { font-family:inherit; font-size:13px; font-weight:700; padding:14px 6px; border:none; border-radius:18px; background:#fff; box-shadow:0 5px 0 #e7ddcf; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:6px; color:#544f5b; }
.home-tile:active { transform:translateY(3px); box-shadow:0 2px 0 #e7ddcf; }
.home-tile svg { color:#FF7A45; }

.bigbtn { font-family:inherit; font-size:20px; font-weight:800; color:#fff; background:linear-gradient(180deg,#FF7A8A,#FF5A6E); border:none; border-radius:24px; padding:15px 22px; cursor:pointer; box-shadow:0 6px 0 #d83b54; display:inline-flex; align-items:center; justify-content:center; gap:8px; width:100%; }
.bigbtn:active { transform:translateY(4px); box-shadow:0 2px 0 #d83b54; }
.bigbtn:disabled { background:#cfc8c0; box-shadow:0 6px 0 #b3aca3; }
.play-btn { background:linear-gradient(180deg,#FFD24A,#FFB000); box-shadow:0 6px 0 #d68f00; color:#5e3d00; margin-top:6px; }
.play-btn:active { box-shadow:0 2px 0 #d68f00; }

.map-head, .act-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
.map-head h2 { margin:0; font-size:22px; color:#E8455E; }
.act-head { color:#fff; padding:12px; border-radius:20px; box-shadow:0 4px 0 rgba(0,0,0,.12); }
.act-head h2 { margin:0; font-size:19px; color:#fff; text-shadow:0 1px 2px rgba(0,0,0,.18); }
.back { width:40px; height:40px; border:none; border-radius:14px; background:#fff; cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:0 3px 0 #e2d8ca; color:#544f5b; }
.back.light { background:rgba(255,255,255,.25); color:#fff; box-shadow:none; }
.back:active { transform:translateY(2px); }

.trail { display:flex; flex-direction:column; gap:16px; padding:6px 8px 30px; }
.node-row { display:flex; align-items:center; gap:14px; }
.node-row.right { flex-direction:row-reverse; text-align:right; }
.node { width:72px; height:72px; border:none; border-radius:50%; cursor:pointer; position:relative; box-shadow:0 6px 0 rgba(0,0,0,.16); display:flex; align-items:center; justify-content:center; flex-shrink:0; color:#fff; }
.node-open { animation:bob 2.4s ease-in-out infinite; }
@keyframes bob { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-5px);} }
.node:active.node-open { transform:translateY(3px); box-shadow:0 3px 0 rgba(0,0,0,.16); }
.node-emoji { font-size:32px; }
.node-locked { color:#9a948b; box-shadow:0 6px 0 #c4bdb3; }
.node-check { position:absolute; bottom:-4px; right:-4px; background:#2EC4B6; color:#fff; border-radius:50%; width:24px; height:24px; display:flex; align-items:center; justify-content:center; border:3px solid #fff; }
.node-label { font-weight:700; font-size:15px; color:#4b4651; }
.node-label.dim { color:#a59f96; }

.actscreen { padding-top:10px; }
.act { display:flex; flex-direction:column; align-items:center; gap:14px; padding-top:6px; }
.act-instr { font-weight:700; font-size:16px; color:#5b5563; text-align:center; margin:4px 0 0; }
.act-meta { font-weight:600; color:#8a8492; font-size:14px; }
.center { text-align:center; }

/* Word (hz + pinyin + meaning) */
.word { font-family:inherit; border:none; background:#fff; border-radius:18px; padding:12px 16px; cursor:pointer; box-shadow:0 5px 0 #ecdfce; display:flex; flex-direction:column; align-items:center; gap:1px; position:relative; min-width:96px; }
.word:active { transform:translateY(3px); box-shadow:0 2px 0 #ecdfce; }
.word-hz { font-size:30px; font-weight:800; color:#2D2A32; line-height:1.1; }
.word-py { font-size:15px; font-weight:800; color:#FF5A6E; }
.word-en { font-size:13px; color:#8a8492; font-weight:600; }
.word-spk { position:absolute; top:6px; right:6px; color:#bcd; }
.word-lg .word-hz { font-size:46px; }
.word-xl { padding:18px 26px; }
.word-xl .word-hz { font-size:84px; line-height:1; }
.word-xl .word-py { font-size:24px; }
.word-xl .word-en { font-size:17px; }

/* Welcome */
.welcome { text-align:center; }
.speech-bubble { background:#fff; border-radius:8px 22px 22px 22px; padding:16px 18px; box-shadow:0 6px 0 #ecdfce; text-align:left; }
.speech-bubble b { color:#E8455E; }
.speech-bubble p { margin:8px 0 0; font-weight:600; color:#4b4651; }
.goals { background:#FFF6E9; border-radius:20px; padding:14px 18px; width:100%; box-shadow:0 5px 0 #f0e2c8; }
.goals-title { font-weight:800; color:#a37200; margin-bottom:6px; }
.goals ul { margin:0; padding-left:4px; list-style:none; display:flex; flex-direction:column; gap:6px; font-weight:700; color:#5b5563; }

.snowy { position:relative; }
.story { background:#fff; border-radius:18px; padding:12px 16px; box-shadow:0 5px 0 #ecdfce; text-align:center; font-weight:600; color:#5b5563; }
.story b { color:#E8455E; font-size:20px; }
.story span { color:#8a8492; font-size:14px; }

.dots { display:flex; gap:6px; flex-wrap:wrap; justify-content:center; }
